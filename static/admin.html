<!DOCTYPE html>
<html lang=zh-CN>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1.0">
<title>TokenProxy Management</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#f0f2f5;color:#333}
nav{background:#1a1a2e;color:#fff;padding:16px 24px}
nav h1{font-size:18px;display:inline}
nav span{float:right;font-size:13px;color:#aaa}
main{max-width:960px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:8px;padding:24px;margin-bottom:20px}
.card h2{font-size:16px;margin-bottom:16px;color:#1a1a2e}
.row{display:flex;gap:12px;margin-bottom:12px}
.row input{flex:1;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px}
.btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;background:#1a1a2e;color:#fff}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #eee}
th{color:#666;font-weight:500;font-size:12px}
.msg{display:none;padding:12px;border-radius:6px;margin-bottom:12px}
.green{background:#d4edda;color:#155724}.red{background:#f8d7da;color:#721c24}
.bg-green{background:#d4edda;color:#155724}.bg-red{background:#f8d7da;color:#721c24}
.hide{display:none}
.cp{background:none;border:1px solid #ccc;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;margin-left:4px}
</style>
</head>
<body>
<nav><h1>TokenProxy</h1><span id=navS>not logged in</span></nav>
<main>
<div id=login class=card style="max-width:400px;margin:60px auto;text-align:center;padding:40px">
  <h2>Login</h2>
  <input type=password id=keyIn placeholder="admin key" style="width:100%;padding:12px;margin:12px 0;text-align:center">
  <button id=loginBtn class=btn style="width:100%">Login</button>
</div>
<div id=app class=hide>
  <div class=card><h2>Users</h2><div id=stats></div></div>
  <div class=card>
    <h2>Create User</h2>
    <div id=createMsg class=msg></div>
    <div class=row>
      <input type=text id=nameIn placeholder=name>
      <input type=number id=balIn placeholder=balance value=10>
      <button id=createBtn class=btn>Create</button>
    </div>
  </div>
  <div class=card>
    <table><thead><tr><th>Name</th><th>Key</th><th>Balance</th><th>Status</th></tr></thead><tbody id=userList></tbody></table>
  </div>
</div>
</main>
<script>
var API=window.location.origin,key="";
document.getElementById("loginBtn").onclick=function(){
  var v=document.getElementById("keyIn").value.trim();
  if(!v)return;
  fetch(API+"/v1/balance",{headers:{"Authorization":"Bearer "+v}}).then(function(r){return r.json()}).then(function(d){
    if(d.name){
      key=v;
      document.getElementById("login").className="hide";
      document.getElementById("app").className="";
      document.getElementById("navS").textContent=d.name+" $"+d.balance;
      load();
    }else alert("Invalid key");
  }).catch(function(){alert("Request failed")});
};
function msg(el,t,c){el.textContent=t;el.className="msg "+c;setTimeout(function(){el.className="msg"},3000)}
document.getElementById("createBtn").onclick=function(){
  if(!key)return;
  var n=document.getElementById("nameIn").value.trim(),b=parseFloat(document.getElementById("balIn").value)||10;
  if(!n){alert("Enter name");return}
  var el=document.getElementById("createMsg");
  fetch(API+"/v1/admin/users",{method:"POST",headers:{"Authorization":"Bearer "+key,"Content-Type":"application/json"},body:JSON.stringify({name:n,balance:b})}).then(function(r){return r.json()}).then(function(d){
    if(d.api_key){msg(el,"OK: "+d.api_key,"green");document.getElementById("nameIn").value="";load()}
    else msg(el,d.error||"Error","red");
  }).catch(function(){msg(el,"Network error","red")});
};
function load(){
  fetch(API+"/v1/admin/users",{headers:{"Authorization":"Bearer "+key}}).then(function(r){return r.json()}).then(function(d){
    var users=d.users||[],total=0,h="",i,u;
    for(i=0;i<users.length;i++){
      u=users[i];total+=u.balance;
      h+="<tr><td>"+u.name+"</td><td style=font-family:monospace;font-size:12px>"+u.api_key.substr(0,16)+'...<button class=cp onclick="navigator.clipboard.writeText(\''+u.api_key+'\')">copy</button></td><td>'+u.balance.toFixed(2)+"</td><td><span class="+(u.is_active?"bg-green":"bg-red")+">"+(u.is_active?"active":"disabled")+"</span></td></tr>";
    }
    document.getElementById("userList").innerHTML=h;
    document.getElementById("stats").textContent="Total users: "+users.length+" | Total balance: $"+total.toFixed(2);
  });
}
</script>
</body>
</html>
