<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LinkPower 管理后台</title>
<link rel="stylesheet" href="/static/css/design-system.css">
<style>
body { background: var(--bg-primary); color: var(--text-primary); }
#loginScreen { display:flex; align-items:center; justify-content:center; height:100vh; background:var(--bg-secondary); }
.login-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-2xl); padding:40px 32px; width:400px; max-width:90vw; text-align:center; box-shadow:var(--shadow-lg); }
.login-card h1 { font-size:20px; margin-bottom:4px; }
.login-card .sub { font-size:13px; color:var(--text-secondary); margin-bottom:24px; }
#dash { display:none; }
.dash-layout { display:flex; height:100vh; }
.dash-sidebar { width:220px; background:var(--bg-card); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
.dash-sidebar-header { padding:16px; border-bottom:1px solid var(--border-light); }
.dash-sidebar-body { flex:1; overflow-y:auto; padding:8px; }
.dash-main { flex:1; overflow-y:auto; padding:24px 28px; }
.dash-page { display:none; }
.dash-page.active { display:block; }
.nav-link { display:flex; align-items:center; gap:8px; padding:9px 12px; border-radius:var(--radius); cursor:pointer; font-size:13px; color:var(--text-secondary); transition:all var(--transition); margin-bottom:1px; }
.nav-link:hover { background:var(--bg-hover); color:var(--text-primary); }
.nav-link.active { background:var(--accent-light); color:var(--accent-text); font-weight:500; }
.nav-section { font-size:11px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:1px; padding:16px 12px 6px; font-weight:600; }
.user-row { cursor:pointer; }
.user-row:hover { background:var(--bg-hover); }
.user-detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:16px 0; }
.user-detail-item { background:var(--bg-secondary); padding:10px 14px; border-radius:var(--radius); }
.user-detail-item .lbl { font-size:11px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.5px; }
.user-detail-item .val { font-size:14px; color:var(--text-primary); margin-top:2px; word-break:break-all; }
@media(max-width:768px) { .dash-main { padding:16px; } .dash-sidebar { width:64px; } .nav-link span { display:none; } }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h1>LinkPower 管理后台</h1>
    <p class="sub">请输入管理员 API Key</p>
    <div class="form-group"><input class="form-input" type="password" id="loginKey" placeholder="粘贴管理员 API Key ..."></div>
    <button class="btn btn-primary w-full" id="loginBtn" onclick="adminLogin()">登录</button>
    <div class="form-error mt-2 hidden" id="loginError"></div>
  </div>
</div>

<div id="dash">
  <div class="dash-layout">
    <nav class="dash-sidebar">
      <div class="dash-sidebar-header"><div class="heading-sm">LinkPower</div><div class="text-xs text-muted">管理后台</div></div>
      <div class="dash-sidebar-body">
        <div class="nav-link active" data-page="overview" onclick="navTo('overview')"><span>📊</span><span>概览</span></div>
        <div class="nav-section">用户管理</div>
        <div class="nav-link" data-page="users" onclick="navTo('users')"><span>👥</span><span>用户管理</span></div>
        <div class="nav-link" data-page="create" onclick="navTo('create')"><span>➕</span><span>创建用户</span></div>
        <div class="nav-link" data-page="recharge" onclick="navTo('recharge')"><span>💰</span><span>充值管理</span></div>
        <div class="nav-section">数据</div>
        <div class="nav-link" data-page="txns" onclick="navTo('txns')"><span>📋</span><span>交易记录</span></div>
        <div class="nav-link" data-page="reseller" onclick="navTo('reseller')"><span>🔗</span><span>代理管理</span></div>
      </div>
    </nav>
    <main class="dash-main">
      <!-- Overview -->
      <div class="dash-page active" id="pageOverview">
        <h2 class="heading-lg mb-6">服务概览</h2>
        <div class="stat-grid mb-6">
          <div class="stat-card"><div class="stat-label">用户总数</div><div class="stat-value" id="statUsers">—</div><div class="stat-sub" id="statActiveUsers"></div></div>
          <div class="stat-card"><div class="stat-label">总余额</div><div class="stat-value" id="statBalance">—</div></div>
          <div class="stat-card"><div class="stat-label">总收入</div><div class="stat-value" id="statRevenue">—</div></div>
          <div class="stat-card"><div class="stat-label">今日消耗</div><div class="stat-value" id="statTodayRev">—</div><div class="stat-sub" id="statTodayTokens"></div></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>最近交易</h3></div>
          <div id="recentTxns"><div class="empty-state"><div class="empty-state-desc">加载中...</div></div></div>
        </div>
      </div>
      <!-- Users -->
      <div class="dash-page" id="pageUsers">
        <h2 class="heading-lg mb-4">用户管理</h2>
        <div class="card">
          <div class="flex justify-between items-center mb-4 gap-4">
            <div class="flex gap-3 items-center flex-1">
              <input class="form-input" style="max-width:240px" type="text" id="userSearch" placeholder="搜索用户名、邮箱或 Key..." oninput="renderUsers()">
              <select class="form-select" style="width:auto" id="userStatusFilter" onchange="renderUsers()">
                <option value="">全部</option><option value="active">启用</option><option value="disabled">禁用</option>
              </select>
            </div>
            <span class="text-xs text-muted" id="userCount"></span>
          </div>
          <div class="table-wrap"><table id="userTable"><tbody id="userList"></tbody></table></div>
        </div>
      </div>
      <!-- Create -->
      <div class="dash-page" id="pageCreate">
        <h2 class="heading-lg mb-4">创建用户</h2>
        <div class="card" style="max-width:520px">
          <div class="card-header"><h3>创建新用户</h3></div>
          <div class="form-row"><div class="form-group"><label class="form-label">用户名</label><input class="form-input" id="newName" placeholder="如：客户A"></div><div class="form-group"><label class="form-label">邮箱（可选）</label><input class="form-input" type="email" id="newEmail" placeholder="user@example.com"></div></div>
          <div class="form-group"><label class="form-label">初始余额（元）</label><input class="form-input" type="number" id="newBal" value="0" step="0.1"></div>
          <button class="btn btn-success" id="createUserBtn" onclick="createUser()">创建用户</button>
          <div class="form-error mt-2 hidden" id="createMsg"></div>
          <div class="form-hint mt-2 hidden" style="color:var(--success)" id="createOk"></div>
        </div>
      </div>
      <!-- Recharge -->
      <div class="dash-page" id="pageRecharge">
        <h2 class="heading-lg mb-4">充值管理</h2>
        <div class="card" style="max-width:520px">
          <div class="card-header"><h3>用户充值</h3></div>
          <div class="form-group"><label class="form-label">用户 API Key</label><input class="form-input" id="topKey" placeholder="sk-xxx..."></div>
          <div class="flex gap-2 flex-wrap mb-4" id="amtBtns">
            <button class="btn btn-secondary btn-sm" onclick="setAmt(10)">10 元</button>
            <button class="btn btn-secondary btn-sm" onclick="setAmt(20)">20 元</button>
            <button class="btn btn-secondary btn-sm" onclick="setAmt(50)">50 元</button>
            <button class="btn btn-secondary btn-sm" onclick="setAmt(100)">100 元</button>
            <button class="btn btn-secondary btn-sm" onclick="setAmt(500)">500 元</button>
          </div>
          <div class="form-row"><div class="form-group"><label class="form-label">金额（元）</label><input class="form-input" type="number" id="topAmt" value="10" step="1"></div></div>
          <button class="btn btn-primary" id="topBtn" onclick="doTopUp()">确认充值</button>
          <div class="form-error mt-2 hidden" id="topErr"></div>
          <div class="form-hint mt-2 hidden" style="color:var(--success)" id="topOk"></div>
        </div>
      </div>
      <!-- Transactions -->
      <div class="dash-page" id="pageTxns">
        <h2 class="heading-lg mb-4">交易记录</h2>
        <div class="card">
          <div class="flex justify-between items-center mb-4 gap-4 flex-wrap">
            <div class="flex gap-3 items-center">
              <input class="form-input" style="max-width:180px" id="txnSearch" placeholder="搜索用户..." oninput="renderTxns()">
              <select class="form-select" style="width:auto" id="txnTypeFilter" onchange="renderTxns()">
                <option value="">全部类型</option><option value="usage">用量扣费</option><option value="topup">充值</option><option value="registration_bonus">注册赠送</option><option value="manual_create">手动创建</option>
              </select>
            </div>
            <span class="text-xs text-muted" id="txnCount"></span>
          </div>
          <div class="table-wrap"><table><thead><tr><th>时间</th><th>用户</th><th>类型</th><th>金额</th><th>模型</th><th>Token</th></tr></thead><tbody id="txnList"></tbody></table></div>
        </div>
      </div>
      <!-- Reseller -->
      <div class="dash-page" id="pageReseller">
        <h2 class="heading-lg mb-4">代理管理</h2>
        <div class="card mb-4" style="max-width:520px">
          <div class="card-header"><h3>创建代理</h3></div>
          <div class="form-group"><label class="form-label">代理名称</label><input class="form-input" id="resellerName" placeholder="如：代理A"></div>
          <button class="btn btn-success" onclick="createReseller()">创建代理</button>
          <div class="form-error mt-2 hidden" id="resellerMsg"></div>
          <div class="form-hint mt-2 hidden" style="color:var(--success)" id="resellerOk"></div>
        </div>
        <div class="card"><div class="card-header"><h3>代理列表</h3></div><div id="resellerList"></div></div>
      </div>
    </main>
  </div>
</div>

<div class="modal-overlay hidden" id="userModal" onclick="if(event.target===this)closeUserModal()">
  <div class="modal"><div class="modal-header"><h2 id="modalTitle">用户详情</h2><button class="modal-close" onclick="closeUserModal()">&times;</button></div><div id="modalBody"></div></div>
</div>

<script src="/static/js/utils.js"></script>
<script src="/static/js/api.js"></script>
<script>
let ADMIN_KEY = '';
let allUsers = [];
let allTxns = [];

// ── Auth ────────────────────────────────────────────────
async function adminLogin() {
  const key = $('loginKey').value.trim();
  if (!key) { showLoginError('请输入管理员 Key'); return; }
  const btn = $('loginBtn'); btn.disabled = true; btn.textContent = '验证中...';
  try {
    // 直接用原生 fetch，不经过 api.js（避免 LP_KEY 同步问题）
    const r = await fetch(origin() + '/v1/admin/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key }
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d?.error || '验证失败');
    LP_KEY = key;
    ADMIN_KEY = key;
    $('loginScreen').style.display = 'none';
    $('dash').style.display = 'block';
    loadOverview();
  } catch(e) { showLoginError(e.message); btn.disabled = false; btn.textContent = '登录'; }
}

function showLoginError(m) {
  const el = $('loginError'); el.textContent = m; el.classList.remove('hidden');
}

function navTo(page) {
  document.querySelectorAll('.dash-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  const pg = document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1));
  if (pg) pg.classList.add('active');
  const nl = document.querySelector(`[data-page="${page}"]`);
  if (nl) nl.classList.add('active');

  if (page === 'overview') loadOverview();
  else if (page === 'users') loadUsers();
  else if (page === 'txns') loadTxns();
  else if (page === 'reseller') loadResellers();
}

// ── Data Loading ────────────────────────────────────────
async function loadOverview() {
  try {
    const d = await adminApi.getStats();
    $('statUsers').textContent = d.total_users || 0;
    $('statActiveUsers').textContent = `活跃: ${d.active_users || 0}`;
    $('statBalance').textContent = formatBalance(d.total_balance);
    $('statRevenue').textContent = formatBalance(d.total_topup);
    $('statTodayRev').textContent = formatBalance(d.today_revenue);
    $('statTodayTokens').textContent = formatTokens(d.today_tokens);
    renderRecentTxns((d.recent_transactions || []).slice(0, 20));
  } catch(e) { showToast('加载概览失败: ' + e.message, 'error'); }
}

function renderRecentTxns(txns) {
  if (!txns.length) { $('recentTxns').innerHTML = '<div class="empty-state"><div class="empty-state-desc">暂无交易</div></div>'; return; }
  $('recentTxns').innerHTML = `<div class="table-wrap"><table><thead><tr><th>时间</th><th>用户</th><th>类型</th><th>金额</th><th>Token</th></tr></thead><tbody>${txns.map(t => `<tr><td>${formatDate(t.time)}</td><td>${escHtml(t.user||'')}</td><td><span class="badge ${t.type==='usage'?'badge-danger':'badge-success'}">${escHtml(t.type)}</span></td><td>${formatBalance(t.amount)}</td><td>${formatTokens(t.tokens)}</td></tr>`).join('')}</tbody></table></div>`;
}

async function loadUsers() {
  try {
    const d = await adminApi.getUsers();
    allUsers = d.users || [];
    $('userCount').textContent = `共 ${allUsers.length} 个用户`;
    renderUsers();
  } catch(e) { showToast('加载用户失败: '+e.message, 'error'); }
}

function renderUsers() {
  const q = ($('userSearch')?.value || '').toLowerCase();
  const status = $('userStatusFilter')?.value || '';
  let users = allUsers;
  if (q) users = users.filter(u => (u.name||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q) || (u.api_key||'').toLowerCase().includes(q));
  if (status) users = users.filter(u => status === 'active' ? u.is_active : !u.is_active);
  const h = '<thead><tr><th>用户名</th><th>API Key</th><th>余额</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead>';
  const b = users.map(u => `<tr class="user-row"><td onclick="showUserDetail('${escHtml(u.api_key)}')" style="cursor:pointer;color:var(--accent-text)">${escHtml(u.name)}</td><td class="text-mono" style="max-width:160px" onclick="copyToClipboard('${escHtml(u.api_key)}').then(()=>showToast('已复制','success'))" title="点击复制">${shortKey(u.api_key,14)}</td><td>${formatBalance(u.balance)}</td><td><span class="badge ${u.is_active?'badge-success':'badge-danger'}">${u.is_active?'启用':'禁用'}</span></td><td>${formatDate(u.created_at)}</td><td class="flex gap-2"><button class="btn btn-sm ${u.is_active?'btn-secondary':'btn-success'}" onclick="event.stopPropagation();togUser('${escHtml(u.api_key)}')">${u.is_active?'禁用':'启用'}</button><button class="btn btn-sm btn-danger" onclick="event.stopPropagation();delUser('${escHtml(u.api_key)}')">删除</button></td></tr>`).join('');
  $('userList').innerHTML = h + b;
}

async function showUserDetail(apiKey) {
  const u = allUsers.find(x => x.api_key === apiKey);
  if (!u) return;
  let txnHtml = '<div class="empty-state"><div class="empty-state-desc">加载中...</div></div>';
  $('modalTitle').textContent = u.name;
  $('modalBody').innerHTML = `<div class="user-detail-grid"><div class="user-detail-item"><div class="lbl">用户名</div><div class="val">${escHtml(u.name)}</div></div><div class="user-detail-item"><div class="lbl">邮箱</div><div class="val">${escHtml(u.email||'—')}</div></div><div class="user-detail-item"><div class="lbl">余额</div><div class="val">${formatBalance(u.balance)}</div></div><div class="user-detail-item"><div class="lbl">状态</div><div class="val"><span class="badge ${u.is_active?'badge-success':'badge-danger'}">${u.is_active?'启用':'禁用'}</span></div></div><div class="user-detail-item" style="grid-column:span 2"><div class="lbl">API Key</div><div class="val text-mono" onclick="copyToClipboard('${escHtml(u.api_key)}').then(()=>showToast('已复制','success'))">${escHtml(u.api_key)}</div></div></div><h4 class="heading-sm mb-2">交易记录</h4><div id="modalTxns">${txnHtml}</div>`;
  $('userModal').classList.remove('hidden');
  try {
    const resp = await fetch(origin()+'/v1/user/query', {method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ADMIN_KEY},body:JSON.stringify({})}); // api_key not needed, auth header suffices
    const d = await resp.json();
    const txnBody = (d.transactions||[]).slice(0,30);
    if (!txnBody.length) { $('modalTxns').innerHTML = '<div class="empty-state"><div class="empty-state-desc">暂无交易记录</div></div>'; return; }
    $('modalTxns').innerHTML = `<div class="table-wrap"><table><thead><tr><th>时间</th><th>类型</th><th>金额</th><th>模型</th><th>Token</th></tr></thead><tbody>${txnBody.map(t=>`<tr><td>${formatDate(t.time)}</td><td><span class="badge ${t.type==='usage'?'badge-danger':'badge-success'}">${escHtml(t.type)}</span></td><td>${formatBalance(t.amount)}</td><td>${escHtml(t.model||'')}</td><td>${formatTokens(t.tokens)}</td></tr>`).join('')}</tbody></table></div>`;
  } catch(e) { $('modalTxns').innerHTML = `<div class="empty-state"><div class="empty-state-desc">加载失败: ${escHtml(e.message)}</div></div>`; }
}
function closeUserModal() { $('userModal').classList.add('hidden'); }

async function createUser() {
  const name=$('newName').value.trim(), email=$('newEmail').value.trim(), bal=parseFloat($('newBal').value)||0;
  if(!name){$('createMsg').textContent='请输入用户名';$('createMsg').classList.remove('hidden');return;}
  try {
    const d = await adminApi.createUser(name,email,bal);
    $('createMsg').classList.add('hidden');
    $('createOk').innerHTML=`用户 ${escHtml(d.name)} 创建成功！API Key: <code>${escHtml(d.api_key)}</code> <button class="btn btn-sm btn-ghost" onclick="copyToClipboard('${escHtml(d.api_key)}').then(()=>showToast('已复制','success'))">复制</button>`;
    $('createOk').classList.remove('hidden');
    $('newName').value='';$('newEmail').value='';$('newBal').value='0';
  } catch(e) { $('createMsg').textContent=e.message; $('createMsg').classList.remove('hidden'); $('createOk').classList.add('hidden'); }
}

async function doTopUp() {
  const key=$('topKey').value.trim(), amt=parseFloat($('topAmt').value);
  if(!key){$('topErr').textContent='请输入用户 Key';$('topErr').classList.remove('hidden');return;}
  if(!amt||amt<=0){$('topErr').textContent='金额必须大于 0';$('topErr').classList.remove('hidden');return;}
  try {
    const d = await adminApi.topUp(key,amt);
    $('topErr').classList.add('hidden');
    $('topOk').textContent=`充值成功！${escHtml(d.name)} 余额: ${formatBalance(d.balance)}`;
    $('topOk').classList.remove('hidden');
  } catch(e) { $('topErr').textContent=e.message; $('topErr').classList.remove('hidden'); $('topOk').classList.add('hidden'); }
}

function setAmt(v) {
  $('topAmt').value=v||'';
  document.querySelectorAll('#amtBtns .btn').forEach(b=>b.classList.remove('btn-primary'));
  $('topAmt').focus();
}

async function togUser(k) { try { await adminApi.toggleUser(k); loadUsers(); showToast('状态已切换','success'); } catch(e) { showToast(e.message,'error'); } }
async function delUser(k) { if(!confirm('确定删除该用户？'))return; try { await adminApi.deleteUser(k); loadUsers(); showToast('已删除','success'); } catch(e) { showToast(e.message,'error'); } }

async function loadTxns() {
  try { const d=await adminApi.getStats(); allTxns=(d.recent_transactions||[]).slice(0,200); renderTxns(); }
  catch(e) { showToast('加载交易失败: '+e.message,'error'); }
}
function renderTxns() {
  const q=($('txnSearch')?.value||'').toLowerCase(); const type=$('txnTypeFilter')?.value||'';
  let t=allTxns;
  if(q) t=t.filter(x=>(x.user||'').toLowerCase().includes(q));
  if(type) t=t.filter(x=>x.type===type);
  $('txnCount').textContent=`共 ${t.length} 条`;
  $('txnList').innerHTML=t.map(tx=>`<tr><td>${formatDate(tx.time)}</td><td>${escHtml(tx.user||'')}</td><td><span class="badge ${tx.type==='usage'?'badge-danger':'badge-success'}">${escHtml(tx.type)}</span></td><td>${formatBalance(tx.amount)}</td><td>${escHtml(tx.model||'')}</td><td>${formatTokens(tx.tokens)}</td></tr>`).join('');
}

async function loadResellers() {
  try {
    const d=await adminApi.getResellers(); const r=d.resellers||[];
    if(!r.length) { $('resellerList').innerHTML='<div class="empty-state"><div class="empty-state-desc">暂无代理</div></div>'; return; }
    $('resellerList').innerHTML=`<div class="table-wrap"><table><thead><tr><th>名称</th><th>API Key</th><th>子用户数</th><th>总余额</th><th>创建时间</th></tr></thead><tbody>${r.map(rr=>`<tr><td>${escHtml(rr.name)}</td><td class="text-mono">${shortKey(rr.api_key,16)}</td><td>${rr.user_count}</td><td>${formatBalance(rr.total_balance)}</td><td>${formatDate(rr.created_at)}</td></tr>`).join('')}</tbody></table></div>`;
  } catch(e) { showToast('加载代理列表失败: '+e.message,'error'); }
}

async function createReseller() {
  const name=$('resellerName').value.trim(); if(!name){$('resellerMsg').textContent='请输入代理名称';$('resellerMsg').classList.remove('hidden');return;}
  try{const d=await adminApi.createReseller(name);$('resellerMsg').classList.add('hidden');$('resellerOk').innerHTML=`代理创建成功！Key: <code>${escHtml(d.api_key)}</code>`;$('resellerOk').classList.remove('hidden');$('resellerName').value='';loadResellers();}
  catch(e){$('resellerMsg').textContent=e.message;$('resellerMsg').classList.remove('hidden');$('resellerOk').classList.add('hidden');}
}
</script>
</body>
</html>
