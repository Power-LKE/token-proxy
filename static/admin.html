<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenProxy 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#0f0f1a;color:#e0e0e0;min-height:100vh}
#loginBg{align-items:center;background:#0f0f1a;display:flex;height:100vh;justify-content:center;left:0;position:fixed;top:0;width:100vw;z-index:999}
.login-box{background:#1a1a2e;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);padding:40px;text-align:center;width:420px;max-width:90vw}
.login-box h1{color:#fff;font-size:22px;margin-bottom:4px}
.login-box p{color:#888;font-size:13px;margin-bottom:16px}
.login-box input{background:#252540;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;margin-bottom:12px;outline:none;padding:12px 16px;width:100%;box-sizing:border-box}
.login-box input:focus{border-color:#4f46e5}
.login-box button{background:#4f46e5;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:15px;padding:12px;width:100%}
.login-box button:hover{background:#4338ca}
.login-box button:disabled{opacity:.5;cursor:not-allowed}
.login-box .login-msg{background:rgba(239,68,68,.15);border:1px solid #ef4444;border-radius:6px;color:#fca5a5;font-size:13px;margin-top:12px;padding:8px;display:none}
.key-display{background:#252540;border:1px solid #333;border-radius:8px;padding:10px 14px;margin-bottom:16px;text-align:left;display:none}
.key-display .label{color:#888;font-size:11px;margin-bottom:4px}
.key-display .key-row{display:flex;align-items:center;gap:8px}
.key-display .key-value{color:#a5b4fc;font-family:monospace;font-size:13px;word-break:break-all;flex:1}
.key-display .copy-btn{background:#4f46e5;border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:11px;padding:4px 10px;white-space:nowrap}
.key-display .copy-btn:hover{background:#4338ca}
#dash{display:none}
.sidebar{background:#14142a;border-right:1px solid #1e1e3a;height:100vh;left:0;padding:24px;position:fixed;top:0;width:220px}
.sidebar h2{color:#fff;font-size:16px;margin-bottom:4px}
.sidebar .sub{color:#666;font-size:11px;margin-bottom:24px}
.sidebar a{color:#888;cursor:pointer;display:block;font-size:14px;padding:10px 12px;text-decoration:none}
.sidebar a:hover,.sidebar a.active{background:#1e1e3a;border-radius:6px;color:#fff}
.main{margin-left:220px;padding:32px;min-height:100vh}
.page{display:none}
.page.active{display:block}
.stats{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:24px}
.stat-card{background:#1a1a2e;border-radius:8px;padding:20px}
.stat-card .l{color:#888;font-size:12px;margin-bottom:4px}
.stat-card .v{color:#fff;font-size:28px;font-weight:700}
.card{background:#1a1a2e;border-radius:8px;margin-bottom:16px;padding:20px}
.card h3{color:#fff;font-size:15px;margin-bottom:12px}
.card p{color:#888;font-size:13px;margin-bottom:12px}
label{color:#888;display:block;font-size:12px;margin-bottom:4px}
.inp{background:#252540;border:1px solid #333;border-radius:6px;color:#fff;font-size:13px;outline:none;padding:10px 12px;width:100%;box-sizing:border-box}
.inp:focus{border-color:#4f46e5}
.row{display:grid;gap:12px;grid-template-columns:1fr 1fr;margin-bottom:12px}
@media(max-width:600px){.row{grid-template-columns:1fr}}
.btn{background:#252540;border:none;border-radius:6px;color:#c0c0c0;cursor:pointer;font-size:13px;padding:10px 16px;display:inline-block}
.btn-primary{background:#4f46e5;color:#fff}
.btn-warning{background:#b45309;color:#fff}
.btn-success{background:#16a34a;color:#fff}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:#888;padding:10px 12px;border-bottom:1px solid #333;font-weight:400;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #1e1e3a}
tr:hover{background:#14142a}
.key-cell{font-family:monospace;font-size:12px;color:#a5b4fc;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px}
.badge.on{background:rgba(22,163,74,.15);color:#4ade80}
.badge.off{background:rgba(239,68,68,.15);color:#f87171}
.msg{background:rgba(22,163,74,.1);border:1px solid #16a34a;border-radius:6px;color:#86efac;font-size:13px;margin-top:12px;padding:10px 12px;display:none}
.msg.err{background:rgba(239,68,68,.15);border-color:#ef4444;color:#fca5a5}
.search-bar{margin-bottom:12px}
.search-bar input{background:#252540;border:1px solid #333;border-radius:6px;color:#fff;font-size:13px;outline:none;padding:8px 12px;width:100%;max-width:300px}
.search-bar input:focus{border-color:#4f46e5}
</style>
</head>
<body>
<div id="loginBg">
  <div class="login-box">
    <h1>TokenProxy 管理后台</h1>
    <p>请输入管理员 API Key 登录</p>
    <input type="password" id="loginKey" placeholder="粘贴管理员 API Key..." />
    <button id="loginBtn">登录</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>
<div id="dash">
  <div class="sidebar">
    <h2>TokenProxy</h2>
    <div class="sub">管理后台</div>
    <a id="navOverview" class="active" onclick="showPage('overview')">概览</a>
    <a id="navUsers" onclick="showPage('users')">用户管理</a>
    <a id="navCreate" onclick="showPage('create')">创建用户</a>
    <a id="navSettings" onclick="showPage('settings')">充值管理</a>
  </div>
  <div class="main">
    <div class="page active" id="pageOverview">
      <h2 style="font-size:20px;margin-bottom:20px">服务概览</h2>
      <div class="stats">
        <div class="stat-card"><div class="l">用户总数</div><div class="v" id="statUsers">-</div></div>
        <div class="stat-card"><div class="l">总余额</div><div class="v" id="statBalance">-</div></div>
        <div class="stat-card"><div class="l">服务状态</div><div class="v" id="statStatus">-</div></div>
      </div>
    </div>
    <div class="page" id="pageUsers">
      <h2 style="font-size:20px;margin-bottom:16px">用户管理</h2>
      <div class="card">
        <h3>用户列表</h3>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="搜索用户名或 Key..." />
        </div>
        <div id="userList"><p style="color:#888;text-align:center;padding:20px">加载中...</p></div>
      </div>
    </div>
    <div class="page" id="pageCreate">
      <h2 style="font-size:20px;margin-bottom:16px">创建用户</h2>
      <div class="card">
        <h3>创建新用户</h3>
        <p>创建一个新的 API 用户，系统将自动生成 API Key。</p>
        <div class="row">
          <div><label>用户名</label><input type="text" class="inp" id="newName" placeholder="例如：客户A" /></div>
          <div><label>初始余额（元）</label><input type="number" class="inp" id="newBal" value="1.0" step="0.1" /></div>
        </div>
        <button class="btn btn-success" id="createBtn">创建用户</button>
        <div class="msg" id="createMsg"></div>
      </div>
    </div>
    <div class="page" id="pageSettings">
      <h2 style="font-size:20px;margin-bottom:16px">充值管理</h2>
      <div class="card">
        <h3>用户充值</h3>
        <p>输入用户的 API Key 为其增加余额。</p>
        <div class="row">
          <div><label>用户 API Key</label><input type="text" class="inp" id="topKey" placeholder="sk-xxx..." /></div>
          <div><label>充值金额（元）</label><input type="number" class="inp" id="topAmt" value="10" step="1" /></div>
        </div>
        <button class="btn btn-primary" id="topBtn">充值</button>
        <div class="msg" id="topMsg"></div>
      </div>
    </div>
  </div>
</div>
<script>
var ADMIN_KEY = ""; var allUsers = [];
function $(id){return document.getElementById(id);}
function api(path,method,body){
  var o={headers:{"Authorization":"Bearer "+ADMIN_KEY}};
  if(method)o.method=method;
  if(body){o.method="POST";o.body=JSON.stringify(body);o.headers["Content-Type"]="application/json";}
  return fetch(window.location.origin+path,o).then(function(r){return r.json();});
}
$("loginBtn").onclick=function(){
  var k=$("loginKey").value.trim(),m=$("loginMsg");
  if(!k){m.textContent="请输入 API Key";m.style.display="block";return;}
  ADMIN_KEY=k;$("loginBtn").disabled=true;$("loginBtn").textContent="登录中...";
  api("/v1/admin/verify","POST").then(function(d){
    if(d.status==="ok"){$("loginBg").style.display="none";$("dash").style.display="block";loadOverview();}
    else{m.textContent=d.error||"验证失败";m.style.display="block";$("loginBtn").disabled=false;$("loginBtn").textContent="登录";}
  }).catch(function(e){m.textContent="请求失败: "+e.message;m.style.display="block";$("loginBtn").disabled=false;$("loginBtn").textContent="登录";});
};
$("loginKey").onkeydown=function(e){if(e.key==="Enter")$("loginBtn").click();};
function showPage(n){
  ["navOverview","navUsers","navCreate","navSettings"].forEach(function(i){$(i).classList.remove("active");});
  if(n==="overview")$("navOverview").classList.add("active");
  if(n==="users")$("navUsers").classList.add("active");
  if(n==="create")$("navCreate").classList.add("active");
  if(n==="settings")$("navSettings").classList.add("active");
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  $("page"+n.charAt(0).toUpperCase()+n.slice(1)).classList.add("active");
  if(n==="overview")loadOverview();if(n==="users")loadUsers();
}
function loadOverview(){
  api("/v1/admin/verify","POST").then(function(d){
    $("statUsers").textContent=d.user_count;$("statBalance").textContent=d.total_balance.toFixed(2)+" 元";
    $("statStatus").textContent="正常";$("statStatus").style.color="#4ade80";
  }).catch(function(e){$("statStatus").textContent="连接异常";$("statStatus").style.color="#f87171";});
}
function loadUsers(){api("/v1/admin/users").then(function(d){if(d.users){allUsers=d.users;renderUsers();}}).catch(function(){});}
function renderUsers(){
  var q=$("searchInput").value||"";
  var f=q?allUsers.filter(function(u){return u.name.indexOf(q)!==-1||u.api_key.indexOf(q)!==-1;}):allUsers;
  if(f.length===0){$("userList").innerHTML='<p style="color:#888;text-align:center;padding:20px">暂无用户</p>';return;}
  var h="<table><thead><tr><th>用户名</th><th>API Key</th><th>余额</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead><tbody>";
  for(var i=0;i<f.length;i++){var u=f[i];
    var badge=u.is_active?'<span class="badge on">启用</span>':'<span class="badge off">禁用</span>';
    h+="<tr><td>"+u.name+"</td>";
    h+='<td class="key-cell">'+u.api_key.substring(0,20)+'...</td>';
    h+="<td>"+u.balance.toFixed(2)+" 元</td>";
    h+="<td>"+badge+"</td>";
    h+='<td style="font-size:12px;color:#666">'+(u.created_at||"-").substring(0,10)+"</td>";
    var tt=u.is_active?"禁用":"启用";var tc=u.is_active?"btn-warning":"btn-success";
    h+='<td><button class="btn '+tc+'" style="padding:4px 10px;font-size:12px" onclick="togUser('+"'"+u.api_key+"'"+')">'+tt+"</button></td>";
    h+="</tr>";}
  h+="</tbody></table>";$("userList").innerHTML=h;
}
$("searchInput").onkeyup=function(){renderUsers();};
function togUser(k){api("/v1/admin/users/toggle","POST",{api_key:k}).then(function(d){if(d.name)loadUsers();}).catch(function(){});}
$("createBtn").onclick=function(){
  var n=$("newName").value.trim();var b=parseFloat($("newBal").value)||1.0;var m=$("createMsg");
  if(!n){m.textContent="请输入用户名";m.className="msg err";m.style.display="block";return;}
  api("/v1/admin/users","POST",{name:n,balance:b}).then(function(d){
    if(d.api_key){m.innerHTML='已创建用户 <b>'+d.name+'</b>，初始余额 '+d.balance.toFixed(2)+' 元<br>API Key: <code style="color:#a5b4fc">'+d.api_key+"</code>";m.className="msg";m.style.display="block";$("newName").value="";loadOverview();loadUsers();}
    else{m.textContent=d.error||"创建失败";m.className="msg err";m.style.display="block";}
  }).catch(function(e){m.textContent="请求失败: "+e.message;m.className="msg err";m.style.display="block";});
};
$("topBtn").onclick=function(){
  var k=$("topKey").value.trim();var a=parseFloat($("topAmt").value)||0;var m=$("topMsg");
  if(!k){m.textContent="请输入用户 API Key";m.className="msg err";m.style.display="block";return;}
  if(a<=0){m.textContent="充值金额必须大于 0";m.className="msg err";m.style.display="block";return;}
  api("/v1/admin/users/topup","POST",{api_key:k,amount:a}).then(function(d){
    if(d.balance!==undefined){m.innerHTML='已为 <b>'+d.name+'</b> 充值，当前余额 <b>'+d.balance.toFixed(2)+'</b> 元';m.className="msg";m.style.display="block";$("topKey").value="";loadOverview();loadUsers();}
    else{m.textContent=d.error||"充值失败";m.className="msg err";m.style.display="block";}
  }).catch(function(e){m.textContent="请求失败: "+e.message;m.className="msg err";m.style.display="block";});
};
</script>
</body>
</html>
