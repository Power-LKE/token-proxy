<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LinkPower · AI 智能对话</title>
<link rel="stylesheet" href="/static/css/design-system.css">
<style>
/* ── Page-specific Layout ──────────────────────────────── */
body { height: 100vh; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; }

/* Landing */
#landingPage {
  display: flex; flex-direction: column; min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  position: relative; overflow: hidden;
}
#landingPage::before {
  content: ""; position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='g' patternUnits='userSpaceOnUse' width='60' height='60'%3E%3Ccircle cx='30' cy='30' r='1.5' fill='rgba(255,255,255,.05)'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='60' height='60' fill='url(%23g)'/%3E%3C/svg%3E");
  pointer-events: none;
}
.landing-hero {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:40px 24px; text-align:center; position:relative; z-index:1;
}
.landing-icon {
  width:72px; height:72px; background:rgba(255,255,255,.12); backdrop-filter:blur(10px);
  border-radius:20px; display:flex; align-items:center; justify-content:center;
  margin-bottom:20px; font-size:32px; border:1px solid rgba(255,255,255,.12);
}
.landing-hero h1 {
  font-size:44px; font-weight:800; color:#fff; margin-bottom:6px; letter-spacing:-1px;
}
.landing-subtitle { font-size:16px; color:rgba(255,255,255,.75); margin-bottom:8px; }
.landing-desc { font-size:14px; color:rgba(255,255,255,.55); margin-bottom:32px; max-width:480px; line-height:1.6; }
.landing-btns { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.landing-btn {
  display:inline-flex; align-items:center; gap:6px; background:#fff; border:none;
  border-radius:10px; color:#667eea; cursor:pointer; font-size:14px; font-weight:600;
  padding:12px 28px; transition:all .3s cubic-bezier(.22,1,.36,1);
  box-shadow:0 6px 24px rgba(0,0,0,.12);
}
.landing-btn:hover { transform:translateY(-2px); box-shadow:0 10px 32px rgba(0,0,0,.18); }
.landing-btn-outline { background:transparent; color:#fff; border:1.5px solid rgba(255,255,255,.25); box-shadow:none; }
.landing-btn-outline:hover { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.4); }
.landing-features {
  padding:48px 24px; background:rgba(0,0,0,.12); position:relative; z-index:1;
}
.landing-features-inner { max-width:960px; margin:0 auto; }
.landing-footer { text-align:center; padding:16px; color:rgba(255,255,255,.3); font-size:12px; position:relative; z-index:1; }
@media(max-width:640px) {
  .landing-hero h1 { font-size:32px; }
  .landing-btn { padding:10px 22px; font-size:13px; }
}

/* Auth */
#authPage {
  display:flex; align-items:center; justify-content:center; min-height:100vh;
  padding:20px; background:var(--bg-secondary);
}
.auth-card {
  background:var(--bg-card); border-radius:var(--radius-2xl); padding:44px 36px;
  width:400px; max-width:100%; box-shadow:var(--shadow-lg); border:1px solid var(--border);
  position:relative; overflow:hidden;
}
.auth-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--accent), #764ba2);
}
.auth-card h1 { font-size:22px; font-weight:700; text-align:center; margin-bottom:4px; }
.auth-card .sub { font-size:13px; color:var(--text-secondary); text-align:center; margin-bottom:24px; }
.auth-footer { text-align:center; font-size:12px; color:var(--text-tertiary); margin-top:16px; }
.auth-footer a { color:var(--accent-text); cursor:pointer; }

/* Chat Layout */
#chatApp { display:none; flex-direction:column; height:100vh; }
.chat-body { display:flex; flex:1; overflow:hidden; }
.chat-main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg-primary); }

/* Welcome */
.welcome { text-align:center; padding:60px 20px; max-width:440px; margin:0 auto; }
.welcome-icon {
  width:64px; height:64px; background:linear-gradient(135deg,var(--accent),#764ba2);
  border-radius:16px; box-shadow:0 8px 24px rgba(91,91,214,.25);
  display:flex; align-items:center; justify-content:center; margin:0 auto 14px; font-size:26px;
}
.welcome h2 { font-size:22px; font-weight:700; margin-bottom:4px; }
.welcome p { font-size:13px; color:var(--text-secondary); margin-bottom:16px; }

/* Input Area */
.input-area {
  padding:12px 16px 16px; max-width:820px; margin:0 auto; width:100%;
  display:flex; gap:8px; align-items:flex-end;
}
.chat-input {
  flex:1; padding:10px 14px; background:var(--bg-card); border:1.5px solid var(--border);
  border-radius:var(--radius-lg); color:var(--text-primary); font-size:14px;
  outline:none; resize:none; min-height:42px; max-height:140px; line-height:1.5;
  transition:border-color var(--transition),box-shadow var(--transition);
}
.chat-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }
.send-btn {
  background:var(--accent); border:none; border-radius:var(--radius-lg); color:#fff;
  cursor:pointer; padding:8px 18px; font-size:14px; font-weight:500; height:42px;
  display:flex; align-items:center; gap:4px; transition:all var(--transition); flex-shrink:0;
}
.send-btn:hover { background:var(--accent-hover); }
.send-btn:disabled { opacity:.4; cursor:not-allowed; }

/* Loading dots */
.loading-dots { display:inline-flex; gap:3px; align-items:center; padding:4px 0; }
.loading-dots span { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 1.2s infinite; }
.loading-dots span:nth-child(2) { animation-delay:.2s; }
.loading-dots span:nth-child(3) { animation-delay:.4s; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Reasoning */
.reasoning-toggle { color:var(--accent-text); font-size:12px; cursor:pointer; margin-bottom:4px; user-select:none; }
.reasoning-toggle:hover { text-decoration:underline; }
.reasoning-body { display:none; font-size:13px; color:var(--text-secondary); background:var(--bg-secondary); border-radius:var(--radius); padding:8px 10px; margin-bottom:8px; border-left:3px solid var(--accent); }
.reasoning-body.show { display:block; }

/* Copy button in pre */
.msg-bubble pre { position:relative; }
.msg-bubble pre .code-copy {
  position:absolute; top:4px; right:4px; background:rgba(255,255,255,.08); border:none;
  color:var(--text-tertiary); cursor:pointer; font-size:11px; padding:2px 6px; border-radius:4px;
  opacity:0; transition:opacity .2s;
}
.msg-bubble pre:hover .code-copy { opacity:1; }

/* File preview */
.file-preview-bar { max-width:820px; margin:0 auto; width:100%; padding:0 16px; }
.file-preview-item { display:flex; align-items:center; gap:6px; padding:6px 12px; background:var(--accent-light); border-radius:var(--radius); font-size:12px; margin-bottom:4px; animation:fade-in .2s ease; }

/* Responsive */
@media(max-width:768px) {
  .sidebar { position:fixed; left:0; top:56px; bottom:0; z-index:50; transform:translateX(-100%); box-shadow:var(--shadow-lg); }
  .sidebar.open { transform:translateX(0); animation:slideIn .3s cubic-bezier(.22,1,.36,1); }
  @keyframes slideIn { from { transform:translateX(-100%); } to { transform:translateX(0); } }
  .msg-bubble { max-width:92%; font-size:13px; }
  .msg-row { padding:0 8px; }
  .input-area { padding:8px 8px 12px; }
  .navbar-center { display:none; }
}
</style>
</head>
<body>
<div id="app">

<!-- ════ Landing ════ -->
<section id="landingPage">
  <div class="landing-hero">
    <div class="landing-icon">⚡</div>
    <h1>LinkPower</h1>
    <p class="landing-subtitle">高性能 AI API 代理服务</p>
    <p class="landing-desc">接入 DeepSeek、OpenAI 等顶级模型，按量计费，即开即用，适合开发者和团队的 AI 基础设施</p>
    <div class="landing-btns">
      <button class="landing-btn" onclick="showAuth('login')">开始使用 →</button>
      <button class="landing-btn landing-btn-outline" onclick="showAuth('register')">免费注册</button>
    </div>
  </div>
  <div class="landing-features">
    <div class="landing-features-inner">
      <div class="stat-grid">
        <div class="stat-card" style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1)">
          <div class="stat-label" style="color:rgba(255,255,255,.5)">模型接入</div>
          <div class="stat-value" style="color:#fff;font-size:20px">3+</div>
        </div>
        <div class="stat-card" style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1)">
          <div class="stat-label" style="color:rgba(255,255,255,.5)">响应速度</div>
          <div class="stat-value" style="color:#fff;font-size:20px">&lt; 2s</div>
        </div>
        <div class="stat-card" style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1)">
          <div class="stat-label" style="color:rgba(255,255,255,.5)">API 兼容</div>
          <div class="stat-value" style="color:#fff;font-size:20px">OpenAI</div>
        </div>
        <div class="stat-card" style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1)">
          <div class="stat-label" style="color:rgba(255,255,255,.5)">注册即送</div>
          <div class="stat-value" style="color:#fff;font-size:20px">¥ 1.0</div>
        </div>
      </div>
    </div>
  </div>
  <div class="landing-footer">LinkPower · AI API Proxy · Built with FastAPI</div>
</section>

<!-- ════ Auth ════ -->
<section id="authPage" class="hidden">
  <div class="auth-card">
    <h1>LinkPower</h1>
    <p class="sub">登录或注册以开始使用</p>
    <div class="tabs" id="authTabs">
      <button class="tab active" onclick="switchAuthTab('login')">登录</button>
      <button class="tab" onclick="switchAuthTab('register')">注册</button>
    </div>
    <div id="loginForm">
      <div class="form-group"><label class="form-label">邮箱</label><input class="form-input" type="email" id="loginEmail" placeholder="your@email.com"></div>
      <div class="form-group"><label class="form-label">密码</label><input class="form-input" type="password" id="loginPassword" placeholder="至少 6 位"></div>
      <button class="btn btn-primary w-full" id="loginBtn" onclick="doLogin()">登录</button>
      <div class="form-error mt-2 hidden" id="loginError"></div>
    </div>
    <div id="registerForm" class="hidden">
      <div class="form-group"><label class="form-label">用户名</label><input class="form-input" type="text" id="regName" placeholder="你的昵称"></div>
      <div class="form-group"><label class="form-label">邮箱</label><input class="form-input" type="email" id="regEmail" placeholder="your@email.com"></div>
      <div class="form-group"><label class="form-label">密码</label><input class="form-input" type="password" id="regPassword" placeholder="至少 6 位"></div>
      <button class="btn btn-primary w-full" id="regBtn" onclick="doRegister()">免费注册</button>
      <div class="form-error mt-2 hidden" id="regError"></div>
    </div>
    <div class="auth-footer">
      <a onclick="showLanding()">← 返回首页</a>
    </div>
  </div>
</section>

<!-- ════ Chat App ════ -->
<div id="chatApp">
  <!-- Navbar -->
  <nav class="navbar">
    <button class="btn btn-ghost btn-icon sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" style="display:none">☰</button>
    <div class="navbar-brand">Link<span>Power</span></div>
    <div class="navbar-center">
      <select class="form-select" id="modelSelect" style="width:auto;min-width:140px" onchange="onModelChange()"></select>
      <span class="badge badge-accent" id="balanceBadge" style="cursor:pointer" onclick="refreshBalance()">¥ —</span>
    </div>
    <div class="navbar-right">
      <span class="text-sm text-muted" id="userNameDisplay"></span>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">退出</button>
    </div>
  </nav>

  <!-- Chat Body -->
  <div class="chat-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="btn btn-primary w-full btn-sm" onclick="newConversation()">＋ 新对话</button>
      </div>
      <div class="p-4"><input class="search-input" id="convSearch" placeholder="搜索对话..." oninput="filterConversations()"></div>
      <div class="sidebar-body" id="conversationList">
        <div class="empty-state"><div class="empty-state-icon">💬</div><div class="empty-state-desc">暂无对话记录</div></div>
      </div>
    </aside>

    <!-- Main Chat -->
    <main class="chat-main">
      <div class="msg-list" id="chatMessages">
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-icon">⚡</div>
          <h2>LinkPower</h2>
          <p>高性能 AI 对话 · 支持多个顶级模型</p>
          <div class="flex gap-2 justify-center flex-wrap" id="modelPills"></div>
        </div>
      </div>
      <div class="file-preview-bar hidden" id="filePreviewBar"></div>
      <div class="input-area">
        <button class="btn btn-ghost btn-icon upload-btn" id="uploadBtn" onclick="triggerUpload()" title="上传文件">📎</button>
        <input type="file" id="hiddenFileInput" class="hidden" onchange="handleFileSelect(event)">
        <textarea class="chat-input" id="chatInput" placeholder="输入消息，Enter 发送，Shift+Enter 换行..." rows="1" onkeydown="onInputKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
          <span id="sendIcon">↑</span>
        </button>
      </div>
    </main>
  </div>
</div>

</div><!-- /#app -->

<script src="/static/js/utils.js"></script>
<script src="/static/js/api.js"></script>
<script>
// ── State ──────────────────────────────────────────────────
let CONVS = store.get('convs') || [];
let CURRENT_CONV = null;
let CURRENT_MODEL = store.raw('model') || 'deepseek-chat';
let SENDING = false;
let FILE_DATA = null;
let REASONING_ACCUM = '';

// ── Init ───────────────────────────────────────────────────
(function init() {
  modelSelect.value = CURRENT_MODEL;
  loadModels();
  if (isLoggedIn()) {
    showChat();
    loadConversations();
    refreshBalance();
  }
  // Mobile sidebar toggle visibility
  if (window.innerWidth <= 768) {
    $('sidebarToggle').style.display = 'block';
  }
})();

// ── Page Switching ─────────────────────────────────────────
function showLanding() {
  $('landingPage').classList.remove('hidden');
  $('authPage').classList.add('hidden');
  $('chatApp').style.display = 'none';
}
function showAuth(tab) {
  $('landingPage').classList.add('hidden');
  $('authPage').classList.remove('hidden');
  $('chatApp').style.display = 'none';
  switchAuthTab(tab || 'login');
}
function showChat() {
  $('landingPage').classList.add('hidden');
  $('authPage').classList.add('hidden');
  $('chatApp').style.display = 'flex';
  $('userNameDisplay').textContent = LP_NAME || '';
}

function switchAuthTab(tab) {
  const tabs = $$('#authTabs .tab');
  tabs.forEach(t => t.classList.remove('active'));
  if (tab === 'login') {
    tabs[0].classList.add('active');
    $('loginForm').classList.remove('hidden');
    $('registerForm').classList.add('hidden');
  } else {
    tabs[1].classList.add('active');
    $('loginForm').classList.add('hidden');
    $('registerForm').classList.remove('hidden');
  }
}

// ── Auth ───────────────────────────────────────────────────
async function doLogin() {
  const email = $('loginEmail').value.trim();
  const password = $('loginPassword').value;
  if (!email || !email.includes('@')) { showError('login', '请输入有效邮箱'); return; }
  if (!password || password.length < 6) { showError('login', '密码至少 6 位'); return; }
  const btn = $('loginBtn'); btn.disabled = true; btn.textContent = '登录中...';
  try {
    await authApi.login(email, password);
    hideError('login');
    showChat();
    loadConversations();
    refreshBalance();
    loadModels();
    showToast('登录成功', 'success');
  } catch (e) {
    showError('login', e.message);
  } finally {
    btn.disabled = false; btn.textContent = '登录';
  }
}

async function doRegister() {
  const name = $('regName').value.trim();
  const email = $('regEmail').value.trim();
  const password = $('regPassword').value;
  if (!name) { showError('reg', '请输入用户名'); return; }
  if (!email || !email.includes('@')) { showError('reg', '请输入有效邮箱'); return; }
  if (!password || password.length < 6) { showError('reg', '密码至少 6 位'); return; }
  const btn = $('regBtn'); btn.disabled = true; btn.textContent = '注册中...';
  try {
    await authApi.register(name, email, password);
    hideError('reg');
    showChat();
    loadConversations();
    refreshBalance();
    loadModels();
    showToast('注册成功！已赠送 ¥ 1.0 余额', 'success');
  } catch (e) {
    showError('reg', e.message);
  } finally {
    btn.disabled = false; btn.textContent = '免费注册';
  }
}

function doLogout() {
  authApi.logout();
  CONVS = [];
  CURRENT_CONV = null;
  store.del('convs');
  $('chatMessages').innerHTML = '<div class="welcome" id="welcomeScreen"><div class="welcome-icon">⚡</div><h2>LinkPower</h2><p>高性能 AI 对话 · 支持多个顶级模型</p></div>';
  $('conversationList').innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div class="empty-state-desc">暂无对话记录</div></div>';
  showLanding();
}

function showError(prefix, msg) {
  const el = $(prefix + 'Error');
  if (el) { el.textContent = msg; el.classList.remove('hidden'); }
}
function hideError(prefix) {
  const el = $(prefix + 'Error');
  if (el) el.classList.add('hidden');
}

// ── Models ─────────────────────────────────────────────────
async function loadModels() {
  try {
    const models = await modelApi.list();
    const sel = $('modelSelect');
    sel.innerHTML = models.map(m => `<option value="${escHtml(m.id)}" ${m.id === CURRENT_MODEL ? 'selected' : ''}>${escHtml(m.id)} — ${escHtml(m.owned_by || '')}</option>`).join('');
    // Model pills in welcome
    const pills = $('modelPills');
    if (pills) {
      pills.innerHTML = models.slice(0, 6).map(m =>
        `<button class="btn btn-sm ${m.id === CURRENT_MODEL ? 'btn-primary' : 'btn-secondary'}" onclick="selectModel('${escHtml(m.id)}')">${escHtml(m.id)}</button>`
      ).join('');
    }
  } catch (e) {
    console.warn('Failed to load models:', e);
  }
}

function selectModel(m) {
  CURRENT_MODEL = m;
  store.rawSet('model', m);
  $('modelSelect').value = m;
  loadModels(); // refresh pills
}

function onModelChange() {
  CURRENT_MODEL = $('modelSelect').value;
  store.rawSet('model', CURRENT_MODEL);
  loadModels();
}

// ── Balance ────────────────────────────────────────────────
async function refreshBalance() {
  try {
    const data = await userApi.getBalance();
    $('balanceBadge').textContent = formatBalance(data.balance);
    $('balanceBadge').title = '点击刷新余额';
  } catch {
    $('balanceBadge').textContent = '¥ —';
  }
}

// ── Conversations (local) ──────────────────────────────────
function loadConversations() {
  renderConversations();
}

function renderConversations() {
  const el = $('conversationList');
  if (!CONVS.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div class="empty-state-desc">暂无对话记录</div></div>';
    return;
  }
  el.innerHTML = CONVS.map((c, i) => `
    <div class="sidebar-item${CURRENT_CONV === i ? ' active' : ''}" onclick="switchConversation(${i})">
      <span class="sidebar-item-icon">💬</span>
      <span class="sidebar-item-text">${escHtml(c.title || '新对话')}</span>
      <span class="sidebar-item-icon" style="font-size:12px;opacity:0" onmouseover="this.style.opacity='1'" onclick="event.stopPropagation();deleteConversation(${i})">×</span>
    </div>
  `).join('');
}

function newConversation() {
  CURRENT_CONV = null;
  FILE_DATA = null;
  $('chatMessages').innerHTML = `<div class="welcome" id="welcomeScreen"><div class="welcome-icon">⚡</div><h2>LinkPower</h2><p>高性能 AI 对话 · 支持多个顶级模型</p><div class="flex gap-2 justify-center flex-wrap" id="modelPills"></div></div>`;
  loadModels();
  $('filePreviewBar').classList.add('hidden');
  renderConversations();
  $('chatInput').focus();
}

function switchConversation(index) {
  CURRENT_CONV = index;
  const conv = CONVS[index];
  $('chatMessages').innerHTML = (conv.messages || []).map(m => renderMessageHTML(m)).join('');
  $('chatMessages').scrollTop = $('chatMessages').scrollHeight;
  renderConversations();
}

function deleteConversation(index) {
  CONVS.splice(index, 1);
  store.set('convs', CONVS);
  if (CURRENT_CONV === index) newConversation();
  else renderConversations();
}

function filterConversations() {
  const q = $('convSearch').value.toLowerCase();
  const items = $$('#conversationList .sidebar-item');
  items.forEach(el => {
    if (el.classList.contains('empty-state')) return;
    const title = (el.querySelector('.sidebar-item-text')?.textContent || '').toLowerCase();
    el.style.display = title.includes(q) ? '' : 'none';
  });
}

// ── Chat ───────────────────────────────────────────────────
function renderMessageHTML(m) {
  const isUser = m.role === 'user';
  const avatar = isUser ? (LP_NAME?.[0] || '👤') : '🤖';
  const avatarCls = isUser ? 'user' : 'ai';
  const content = m.content || '';

  let html = `<div class="msg-row${isUser ? ' user' : ''}">`;
  html += `<div class="msg-avatar ${avatarCls}">${escHtml(avatar)}</div>`;
  html += `<div class="msg-bubble">`;

  if (m.reasoning) {
    html += `<div class="reasoning-toggle" onclick="this.nextElementSibling.classList.toggle('show')">查看推理过程</div>`;
    html += `<div class="reasoning-body">${escHtml(m.reasoning)}</div>`;
  }

  html += renderMarkdown(content);
  html += `<div class="msg-meta">`;
  if (m.cost != null) html += `<span>消耗: ${formatBalance(m.cost)}</span>`;
  if (m.tokens) html += `<span>${formatTokens(m.tokens)}</span>`;
  if (m.model) html += `<span>${escHtml(m.model)}</span>`;
  html += `</div></div></div>`;
  return html;
}

async function sendMessage() {
  if (SENDING) return;
  const input = $('chatInput');
  const text = input.value.trim();
  if (!text && !FILE_DATA) return;

  SENDING = true;
  $('sendBtn').disabled = true;
  $('sendIcon').innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';

  // Ensure conversation exists
  if (CURRENT_CONV == null) {
    CONVS.unshift({ id: Date.now(), title: text.slice(0, 30), messages: [], createdAt: new Date().toISOString() });
    CURRENT_CONV = 0;
  }

  const conv = CONVS[CURRENT_CONV];

  // Build message content with optional file
  let userContent = text;
  if (FILE_DATA) {
    if (FILE_DATA.type === 'text') {
      userContent = `[文件: ${FILE_DATA.filename}]\n内容:\n${FILE_DATA.content}\n\n${text || '请分析以上文件内容'}`;
    } else if (FILE_DATA.type === 'image') {
      userContent = [{ type: 'image_url', image_url: { url: `data:${FILE_DATA.mime};base64,${FILE_DATA.content}` } }];
      if (text) userContent.push({ type: 'text', text });
    }
  }
  FILE_DATA = null;
  $('filePreviewBar').classList.add('hidden');

  // Add user message
  const userMsg = { role: 'user', content: text || '[文件]' };
  conv.messages.push(userMsg);
  appendMessage(userMsg, true);
  input.value = '';
  input.style.height = 'auto';

  // Build messages array (system prompt + history + new message)
  const apiMessages = [
    { role: 'system', content: `你是 LinkPower AI 助手，基于 ${CURRENT_MODEL} 模型。请用中文回复。` },
    ...(conv.messages || []).slice(-20).map(m => {
      if (m.role === 'user' && typeof m.content === 'string') return { role: 'user', content: userContent === text ? m.content : m.content };
      return { role: m.role, content: m.content };
    }),
  ];

  // Add AI placeholder
  const aiMsgId = Date.now();
  const aiMsg = { role: 'assistant', content: '', reasoning: '', cost: 0, tokens: 0, model: CURRENT_MODEL };
  conv.messages.push(aiMsg);
  appendMessage(aiMsg, false);

  const aiBubble = $1(`[data-msg-id="${aiMsgId}"]`);
  const contentEl = aiBubble ? $1('.msg-content', aiBubble) : null;

  REASONING_ACCUM = '';

  try {
    await chatApi.send({
      model: CURRENT_MODEL,
      messages: apiMessages,
      stream: true,
      onToken(chunk) {
        const delta = chunk?.choices?.[0]?.delta;
        if (!delta) return;

        // Reasoning content (DeepSeek R1 style)
        if (delta.reasoning_content) {
          REASONING_ACCUM += delta.reasoning_content;
          aiMsg.reasoning = REASONING_ACCUM;
          if (aiBubble) {
            let rt = aiBubble.querySelector('.reasoning-toggle');
            let rb = aiBubble.querySelector('.reasoning-body');
            if (!rt) {
              const bubble = aiBubble.querySelector('.msg-bubble');
              rt = document.createElement('div'); rt.className = 'reasoning-toggle'; rt.textContent = '查看推理过程';
              rb = document.createElement('div'); rb.className = 'reasoning-body show';
              bubble.insertBefore(rt, bubble.firstChild);
              bubble.insertBefore(rb, rt.nextSibling);
            }
            rb.textContent = REASONING_ACCUM;
          }
        }

        if (delta.content) {
          aiMsg.content += delta.content;
          if (contentEl) contentEl.innerHTML = renderMarkdown(aiMsg.content);
        }

        // Scroll
        $('chatMessages').scrollTop = $('chatMessages').scrollHeight;
      },
      onDone(data) {
        if (data?.usage) {
          aiMsg.tokens = data.usage.total_tokens || 0;
        }
        if (data?._cost != null) {
          aiMsg.cost = data._cost;
        }
        if (aiBubble) {
          // Update meta
          const meta = aiBubble.querySelector('.msg-meta');
          if (meta) {
            meta.innerHTML = '';
            if (aiMsg.cost) meta.innerHTML += `<span>消耗: ${formatBalance(aiMsg.cost)}</span>`;
            if (aiMsg.tokens) meta.innerHTML += `<span>${formatTokens(aiMsg.tokens)}</span>`;
            meta.innerHTML += `<span>${escHtml(CURRENT_MODEL)}</span>`;
          }
          // Remove loading dots
          const dots = aiBubble.querySelector('.loading-dots');
          if (dots) dots.remove();
        }
        store.set('convs', CONVS);
        renderConversations();
        refreshBalance();
      },
      onError(msg) {
        aiMsg.content = '请求失败：' + msg;
        if (contentEl) contentEl.innerHTML = renderMarkdown(aiMsg.content);
        showToast(msg, 'error');
      },
    });
  } catch (e) {
    if (!aiMsg.content) {
      aiMsg.content = '网络错误，请重试';
      if (contentEl) contentEl.innerHTML = renderMarkdown(aiMsg.content);
    }
  }

  SENDING = false;
  $('sendBtn').disabled = false;
  $('sendIcon').textContent = '↑';
  $('chatInput').focus();
}

function appendMessage(m, isUser) {
  $('welcomeScreen')?.remove();
  const id = 'msg-' + Date.now();
  const html = renderMessageHTML(m).replace('<div class="msg-row', `<div class="msg-row" data-msg-id="${id}"`);
  $('chatMessages').insertAdjacentHTML('beforeend', html);
  $('chatMessages').scrollTop = $('chatMessages').scrollHeight;
}

// ── File Upload ────────────────────────────────────────────
function triggerUpload() { $('hiddenFileInput').click(); }

async function handleFileSelect(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  const bar = $('filePreviewBar');
  bar.classList.remove('hidden');
  bar.innerHTML = `<div class="file-preview-item">📄 ${escHtml(file.name)} (${(file.size / 1024).toFixed(1)} KB) — <span style="color:var(--accent)">上传中...</span></div>`;
  try {
    FILE_DATA = await chatApi.uploadFile(file);
    bar.innerHTML = `<div class="file-preview-item">📄 ${escHtml(file.name)} — <span style="color:var(--success)">已就绪</span> <button class="file-chip-remove" onclick="FILE_DATA=null;$('filePreviewBar').classList.add('hidden')">×</button></div>`;
  } catch (e) {
    bar.innerHTML = `<div class="file-preview-item">📄 ${escHtml(file.name)} — <span style="color:var(--danger)">上传失败: ${escHtml(e.message)}</span> <button class="file-chip-remove" onclick="$('filePreviewBar').classList.add('hidden')">×</button></div>`;
    FILE_DATA = null;
  }
  e.target.value = '';
}

// ── Keyboard ───────────────────────────────────────────────
function onInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  // Auto-resize
  setTimeout(() => {
    const ta = $('chatInput');
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
  }, 0);
}

// ── Sidebar (mobile) ──────────────────────────────────────
function toggleSidebar() {
  $('sidebar').classList.toggle('open');
}
