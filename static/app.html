<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>LinkPower · 你的学习助手</title>
<style>
/* ═══════════════════════════════════════════════════════════
   LinkPower v4 — 左侧对话历史 + 退出登录
   ═══════════════════════════════════════════════════════════ */
:root {
  --bg: #faf9f7; --bg-card: #fff; --bg-input: #f5f3f1; --bg-hover: #f0eeec;
  --text: #1c1917; --text-secondary: #78716c; --text-muted: #a8a29e;
  --border: #e7e5e4; --border-light: #f0efed;
  --accent: #6366f1; --accent-light: #eef2ff; --accent-dark: #4f46e5;
  --success: #059669; --success-light: #ecfdf5; --danger: #ef4444; --danger-light: #fef2f2;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04); --shadow: 0 1px 3px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.06);
  --radius: 10px; --radius-sm: 8px; --radius-lg: 14px; --radius-xl: 18px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
  --font-mono: "SF Mono", "Cascadia Code", "Fira Code", monospace;
  --transition: .2s cubic-bezier(.4,0,.2,1);
  --sidebar-w: 280px;
}
[data-theme="dark"] {
  --bg: #0f0f0f; --bg-card: #1a1a1a; --bg-input: #262626; --bg-hover: #222;
  --text: #e8e6e3; --text-secondary: #999; --text-muted: #666;
  --border: #2a2a2a; --border-light: #222;
  --accent: #818cf8; --accent-light: #1e1b4b; --accent-dark: #6366f1;
}
*,*::before,*::after{box-sizing:border-box}
html{font-size:16px}body{margin:0;font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;height:100dvh;overflow:hidden}
button{cursor:pointer;font-family:inherit;border:none}input,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── Layout ─────────────────────────────────────── */
#app{display:flex;height:100dvh;overflow:hidden}
.hide{display:none!important}

/* ── Sidebar ────────────────────────────────────── */
#sidebar{width:var(--sidebar-w);background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width var(--transition),margin var(--transition)}
#sidebar.collapsed{width:0;overflow:hidden;border-right:none}
.sidebar-inner{display:flex;flex-direction:column;height:100%;width:var(--sidebar-w);flex-shrink:0}
.sidebar-header{padding:10px 14px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.sidebar-header .logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:5px}
.sidebar-header .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:dotPulse 2s infinite}
@keyframes dotPulse{0%,100%{opacity:.5}50%{opacity:1}}
.sidebar-new-btn{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.sidebar-new-btn:hover{background:var(--accent-dark);transform:scale(1.05)}
.sidebar-new-btn:active{transform:scale(.93)}
.sidebar-body{flex:1;overflow-y:auto;padding:6px}
.conv-item{padding:10px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text-secondary);margin-bottom:2px;transition:all var(--transition);display:flex;align-items:center;gap:8px}
.conv-item:hover{background:var(--bg-hover);color:var(--text)}
.conv-item.active{background:var(--accent-light);color:var(--accent);font-weight:500}
.conv-item-icon{font-size:14px;flex-shrink:0;opacity:.6}
.conv-item-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-item-del{color:transparent;cursor:pointer;font-size:13px;flex-shrink:0;transition:color var(--transition);padding:0 2px}
.conv-item:hover .conv-item-del{color:var(--danger);opacity:.5}.conv-item-del:hover{opacity:1!important}
.sidebar-search{padding:6px 10px;border-bottom:1px solid var(--border-light)}
.sidebar-search input{width:100%;padding:7px 10px;border-radius:var(--radius-sm);background:var(--bg-input);border:1px solid var(--border);color:var(--text);font-size:12px;outline:none;transition:all var(--transition)}
.sidebar-search input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light)}
.sidebar-footer{padding:10px 14px;border-top:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.sidebar-user{font-size:12px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-logout{font-size:11px;color:var(--text-muted);cursor:pointer;background:none;padding:4px 8px;border-radius:var(--radius-sm);transition:all var(--transition)}
.sidebar-logout:hover{color:var(--danger);background:var(--danger-light)}

/* ── Main ───────────────────────────────────────── */
#mainArea{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Navbar ─────────────────────────────────────── */
.navbar{display:flex;align-items:center;padding:6px 14px;height:44px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.sidebar-toggle{width:30px;height:30px;border-radius:var(--radius-sm);background:transparent;color:var(--text-secondary);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.sidebar-toggle:hover{background:var(--bg-hover);color:var(--text)}
.nav-model{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent);font-weight:500;border:none;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;gap:4px}
.nav-model:hover{background:var(--accent);color:#fff}
.nav-balance{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--bg-input);color:var(--text-secondary);cursor:pointer;transition:all var(--transition);margin-left:auto}
.nav-balance:hover{background:var(--bg-hover)}
.nav-theme{width:28px;height:28px;border-radius:50%;background:transparent;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition)}
.nav-theme:hover{background:var(--bg-hover)}

/* ── Auth Overlay ───────────────────────────────── */
#authOverlay{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:36px 28px;width:380px;max-width:100%;box-shadow:var(--shadow-lg);animation:fadeUp .4s ease}
.auth-card h2{font-size:20px;font-weight:700;text-align:center;margin:0 0 4px}
.auth-card .sub{font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:20px}
.auth-tabs{display:flex;gap:4px;background:var(--bg-input);border-radius:var(--radius);padding:3px;margin-bottom:20px}
.auth-tab{flex:1;padding:7px;border-radius:var(--radius-sm);background:none;color:var(--text-secondary);font-size:13px;font-weight:500;transition:all var(--transition)}
.auth-tab.active{background:var(--bg-card);color:var(--text);box-shadow:var(--shadow-sm)}
.form-group{margin-bottom:14px}.form-label{display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:4px}
.form-input{width:100%;padding:10px 12px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none;transition:all var(--transition)}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.auth-btn{width:100%;padding:12px;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:14px;font-weight:600;transition:all var(--transition)}
.auth-btn:hover{background:var(--accent-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(99,102,241,.3)}
.auth-btn:active{transform:scale(.98)}.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-msg{font-size:12px;margin-top:8px;display:none}.auth-msg.err{display:block;color:var(--danger)}.auth-msg.ok{display:block;color:var(--success)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── Chat ───────────────────────────────────────── */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-scroll{flex:1;overflow-y:auto;padding:10px 0;scroll-behavior:smooth}
.welcome{padding:40px 20px;text-align:center;animation:fadeUp .5s ease}
.welcome-icon{font-size:52px;margin-bottom:12px;animation:bounce 3s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.welcome h2{font-size:22px;font-weight:700;margin:0 0 4px}.welcome .subtitle{font-size:14px;color:var(--text-secondary);margin:0 0 20px}
.welcome-prompts{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:480px;margin:0 auto}
.prompt-chip{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);font-size:13px;cursor:pointer;transition:all var(--transition)}
.prompt-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);transform:translateY(-2px);box-shadow:var(--shadow)}
.prompt-chip:active{transform:scale(.96)}

.msg{padding:10px 16px;display:flex;gap:10px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;padding-left:80px}.msg.ai{padding-right:80px}
.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;margin-top:4px}
.msg-avatar.u{background:linear-gradient(135deg,#818cf8,#6366f1);color:#fff}.msg-avatar.a{background:var(--bg-input);color:var(--text-secondary);font-size:16px}
.msg-body{max-width:85%;display:flex;flex-direction:column}
.msg-bubble{font-size:14px;line-height:1.65;padding:10px 14px;word-break:break-word}
.msg.user .msg-bubble{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border-radius:16px 16px 4px 16px;box-shadow:0 2px 8px rgba(99,102,241,.25)}
.msg.ai .msg-bubble{background:var(--bg-card);border:1px solid var(--border);border-radius:16px 16px 16px 4px;box-shadow:var(--shadow-sm)}
.msg-bubble p{margin:4px 0}.msg-bubble code{font-family:var(--font-mono);font-size:13px;padding:1px 4px;border-radius:4px}.msg.ai .msg-bubble code{background:var(--bg-input)}.msg.user .msg-bubble code{background:rgba(255,255,255,.18);color:#fff}
.msg-bubble pre{background:var(--bg-input);border-radius:var(--radius-sm);padding:10px;overflow-x:auto;margin:6px 0;font-size:13px;border:1px solid var(--border-light)}
.msg-bubble pre code{background:none;padding:0}
.msg-meta{display:flex;gap:8px;font-size:11px;color:var(--text-muted);margin-top:3px;align-items:center}
.msg.user .msg-meta{justify-content:flex-end;color:rgba(255,255,255,.5)}
.msg-meta .copy-btn{background:none;color:var(--text-muted);cursor:pointer;font-size:11px;border-radius:3px;opacity:0;transition:opacity var(--transition)}
.msg:hover .msg-meta .copy-btn{opacity:1}.copy-btn:hover{background:var(--bg-hover);color:var(--text)}

.thinking{display:inline-flex;gap:3px;padding:4px 0}
.thinking span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:thinkBounce 1.4s infinite}
.thinking span:nth-child(2){animation-delay:.2s}.thinking span:nth-child(3){animation-delay:.4s}
@keyframes thinkBounce{0%,60%,100%{transform:translateY(0);opacity:.25}30%{transform:translateY(-6px);opacity:1}}

/* ── Input ──────────────────────────────────────── */
.input-area{padding:6px 12px 12px;flex-shrink:0}
.input-bar{display:flex;align-items:flex-end;gap:6px;background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:6px 6px 6px 14px;transition:all var(--transition);box-shadow:var(--shadow)}
.input-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light),var(--shadow-lg)}
.input-bar textarea{flex:1;border:none;background:none;outline:none;resize:none;font-size:14px;line-height:1.5;padding:5px 0;color:var(--text);min-height:24px;max-height:120px}
.input-bar textarea::placeholder{color:var(--text-muted)}
.send-btn{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);flex-shrink:0}
.send-btn:hover{background:var(--accent-dark);transform:scale(1.06);box-shadow:0 2px 10px rgba(99,102,241,.35)}
.send-btn:active{transform:scale(.92)}.send-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

.upload-btn{width:30px;height:30px;border-radius:50%;background:transparent;color:var(--text-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);flex-shrink:0}
.upload-btn:hover{background:var(--bg-hover);color:var(--accent)}

.file-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--accent-light);color:var(--accent);border-radius:20px;font-size:12px;margin:0 12px 4px}
.file-tag .rm{background:none;color:var(--accent);cursor:pointer;font-size:14px;padding:0 2px;opacity:.6}.file-tag .rm:hover{opacity:1}

#toasts{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;box-shadow:var(--shadow-lg);animation:slideIn .3s ease;pointer-events:auto;max-width:320px}
.toast.ok{background:var(--success-light);border-left:3px solid var(--success);color:var(--success)}
.toast.err{background:var(--danger-light);border-left:3px solid var(--danger);color:var(--danger)}
@keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}

@media(max-width:640px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50;box-shadow:var(--shadow-lg)}
  #sidebar:not(.collapsed):not(.open){transform:translateX(-100%)}#sidebar.open{transform:translateX(0)}
  .msg{padding:8px 8px;gap:6px}.msg.user{padding-left:44px}.msg.ai{padding-right:44px}
  .msg-bubble{font-size:13px;padding:8px 12px}.msg-body{max-width:92%}
  .welcome h2{font-size:20px}.input-area{padding:4px 8px 10px}
}
</style>
</head>
<body>

<div id="app">
  <!-- ════ Sidebar ════ -->
  <aside id="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-header">
        <span class="logo"><span class="dot"></span>LinkPower</span>
        <button class="sidebar-new-btn" onclick="newChat()" title="新对话">+</button>
      </div>
      <div class="sidebar-search"><input type="text" id="convSearch" placeholder="搜索对话..." oninput="filterConvs()"></div>
      <div class="sidebar-body" id="convList">
        <div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">暂无对话</div>
      </div>
      <div class="sidebar-footer">
        <span class="sidebar-user" id="sidebarUser">未登录</span>
        <button class="sidebar-logout" onclick="doLogout()" id="logoutBtn" style="display:none">退出</button>
      </div>
    </div>
  </aside>

  <!-- ════ Main ════ -->
  <div id="mainArea">
    <!-- Auth -->
    <div id="authOverlay">
      <div class="auth-card">
        <h2>欢迎使用 LinkPower</h2>
        <p class="sub">你的 AI 学习助手</p>
        <div class="auth-tabs"><button class="auth-tab active" onclick="swAuthTab('login')">登录</button><button class="auth-tab" onclick="swAuthTab('register')">注册</button></div>
        <div id="loginForm">
          <div class="form-group"><label class="form-label">邮箱</label><input class="form-input" type="email" id="loginEmail" placeholder="your@email.com"></div>
          <div class="form-group"><label class="form-label">密码</label><input class="form-input" type="password" id="loginPassword" placeholder="至少 6 位"></div>
          <button class="auth-btn" id="loginBtn" onclick="doLogin()">登录</button>
          <div class="auth-msg" id="loginMsg"></div>
        </div>
        <div id="registerForm" class="hide">
          <div class="form-group"><label class="form-label">用户名</label><input class="form-input" id="regName" placeholder="你的昵称"></div>
          <div class="form-group"><label class="form-label">邮箱</label><input class="form-input" type="email" id="regEmail" placeholder="your@email.com"></div>
          <div class="form-group"><label class="form-label">密码（至少 6 位）</label><input class="form-input" type="password" id="regPassword" placeholder="至少 6 位"></div>
          <button class="auth-btn" id="regBtn" onclick="doRegister()">免费注册（送 ¥1.00）</button>
          <div class="auth-msg" id="regMsg"></div>
        </div>
      </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="侧边栏">☰</button>
      <select class="nav-model" id="modelPick" onchange="CURRENT_MODEL=this.value;localStorage.setItem(P+'model',CURRENT_MODEL);refreshModels()">
        <option value="deepseek-chat">DeepSeek V3</option>
      </select>
      <span class="nav-balance" id="balBadge" onclick="refreshBal()" title="点击刷新">⚡ <span id="balText">—</span></span>
      <button class="nav-theme" onclick="toggleTheme()" title="切换主题">🌓</button>
    </nav>

    <!-- Chat -->
    <div class="chat-wrap">
      <div class="chat-scroll" id="chatScroll">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">🎓</div>
          <h2>你好，我是你的学习助手</h2>
          <p class="subtitle">高数 · 编程 · 论文 · 实验报告 — 我都能帮你</p>
          <div class="welcome-prompts">
            <button class="prompt-chip" onclick="quickAsk('帮我用简单的方式解释微积分中的链式法则')">📐 链式法则</button>
            <button class="prompt-chip" onclick="quickAsk('帮我写一段 Python 快速排序代码，加上注释')">💻 快速排序</button>
            <button class="prompt-chip" onclick="quickAsk('帮我把这段文字润色得更学术')">📝 论文润色</button>
            <button class="prompt-chip" onclick="quickAsk('用通俗的方式解释什么是机器学习')">🤖 机器学习</button>
            <button class="prompt-chip" onclick="quickAsk('帮我写一个实验报告的模板框架')">🔬 实验报告</button>
            <button class="prompt-chip" onclick="quickAsk('把这段英文翻译成中文')">🌐 翻译</button>
          </div>
        </div>
      </div>
      <div id="fileBar"></div>
      <div class="input-area">
        <div class="input-bar">
          <textarea id="chatInput" rows="1" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}" oninput="autoResize()"></textarea>
          <button class="upload-btn" onclick="document.getElementById('fileInput').click()" title="上传文件">📎</button>
          <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled title="发送">↑</button>
          <input type="file" id="fileInput" hidden onchange="handleFile(event)">
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
/* ═══════════════════════════════════════════════════
   LinkPower v4 — Logic
   ═══════════════════════════════════════════════════ */
const P='lp4_';
let KEY='',NAME='',BAL=0,SENDING=false,FILE_DATA=null,CURRENT_MODEL='deepseek-chat';
let CONVS=[];  // [{id,title,msgs:[{role,content,cost,tokens}],model,createdAt}]
let CUR_CONV=null;  // index into CONVS

// ── Init ──────────────────────────────────────────
(function(){
  // Load from any known prefix (migration-safe)
  KEY=localStorage.getItem('lp4_key')||localStorage.getItem('lp3_key')||'';
  NAME=localStorage.getItem('lp4_name')||localStorage.getItem('lp3_name')||'';
  CURRENT_MODEL=localStorage.getItem('lp4_model')||localStorage.getItem('lp3_model')||'deepseek-chat';
  document.getElementById('modelPick').value=CURRENT_MODEL;
  // Migrate old messages
  try{
    const oldMsgs=JSON.parse(localStorage.getItem('lp3_msgs')||'[]');
    const oldConvs=JSON.parse(localStorage.getItem('lp4_convs')||'[]');
    if(oldMsgs.length&&!oldConvs.length){
      CONVS=[{id:Date.now(),title:(oldMsgs[0]?.content||'').slice(0,30),msgs:oldMsgs,model:CURRENT_MODEL,createdAt:new Date().toISOString()}];
      saveConvs();renderConvs();
      localStorage.removeItem('lp3_msgs');localStorage.removeItem('lp3_key');localStorage.removeItem('lp3_name');
    }else{CONVS=oldConvs}
  }catch{try{CONVS=JSON.parse(localStorage.getItem('lp4_convs')||'[]')}catch{}}
  const t=localStorage.getItem('lp4_theme')||localStorage.getItem('lp3_theme');

  if(KEY&&(NAME||'').startsWith('同学')){localStorage.removeItem(P+'key');localStorage.removeItem(P+'name');KEY='';NAME=''}

  if(KEY){hideAuth();renderConvs();refreshBal();refreshModels();setInterval(refreshBal,30000)}
  document.getElementById('sidebarUser').textContent=NAME||'未登录'
  document.getElementById('logoutBtn').style.display=KEY?'':'none'
})();

// ── Helpers ───────────────────────────────────────
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]||c));
const ORIGIN=window.location.origin;
function isValidEmail(e){return /^[^\s@]+@[^\s@]+\.\w{2,}$/.test(e)}
function toast(m,ok){const d=document.createElement('div');d.className='toast '+(ok?'ok':'err');d.textContent=m;$('toasts').appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity .3s';setTimeout(()=>d.remove(),300)},2500)}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme'),n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem(P+'theme',n)}
function scrollBottom(){requestAnimationFrame(()=>{const s=$('chatScroll');s.scrollTop=s.scrollHeight})}
async function copyText(t){try{await navigator.clipboard.writeText(t);return 1}catch{return 0}}
function saveConvs(){localStorage.setItem(P+'convs',JSON.stringify(CONVS))}
function autoResize(){const t=$('chatInput');t.style.height='auto';t.style.height=Math.min(t.scrollHeight,120)+'px'}

// ── Sidebar ───────────────────────────────────────
function toggleSidebar(){
  const s=$('sidebar');
  if(window.innerWidth<=640){s.classList.toggle('open')}
  else{s.classList.toggle('collapsed')}
}

function renderConvs(){
  const el=$('convList');
  if(!CONVS.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">暂无对话<br><span style="font-size:11px">发送消息自动保存</span></div>';return}
  el.innerHTML=CONVS.map((c,i)=>`<div class="conv-item${CUR_CONV===i?' active':''}" onclick="switchConv(${i})">
    <span class="conv-item-icon">💬</span><span class="conv-item-text">${esc(c.title||'新对话')}</span>
    <span class="conv-item-del" onclick="event.stopPropagation();delConv(${i})">×</span>
  </div>`).join('');
}
function filterConvs(){
  const q=($('convSearch').value||'').toLowerCase();
  document.querySelectorAll('.conv-item').forEach(el=>{const t=(el.querySelector('.conv-item-text')?.textContent||'').toLowerCase();el.style.display=t.includes(q)?'':'none'})
}
function switchConv(i){
  CUR_CONV=i;const c=CONVS[i];
  const scroll=$('chatScroll');scroll.innerHTML='';$('welcome')?.remove();
  if(c.msgs) c.msgs.forEach(m=>appendBubble(Math.random(),m.role,m.content,m.cost,m.tokens,'final'))
  scrollBottom();renderConvs()
}
function delConv(i){CONVS.splice(i,1);saveConvs();if(CUR_CONV===i){CUR_CONV=null;$('chatScroll').innerHTML=''}$('welcome')?.remove();renderConvs()}

// ── Auth ──────────────────────────────────────────
function swAuthTab(t){
  document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('active',i===(t==='login'?0:1)));
  $('loginForm').classList.toggle('hide',t!=='login');$('registerForm').classList.toggle('hide',t!=='register')
}
function hideAuth(){$('authOverlay').classList.add('hide');$('sidebarUser').textContent=NAME||'未登录';$('logoutBtn').style.display=KEY?'':'none'}
async function doLogin(){
  const e=$('loginEmail').value.trim(),p=$('loginPassword').value;
  if(!e||!isValidEmail(e)){am('login','请输入正确的邮箱地址');return}
  if(!p||p.length<6){am('login','密码至少 6 位');return}
  const b=$('loginBtn');b.disabled=true;b.textContent='登录中...';
  try{const r=await fetch(ORIGIN+'/v1/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d?.error||'登录失败');setAuth(d.api_key,d.name);hideAuth();refreshBal();refreshModels();toast('登录成功','ok')}
  catch(err){am('login',err.message)}finally{b.disabled=false;b.textContent='登录'}
}
async function doRegister(){
  const n=$('regName').value.trim(),e=$('regEmail').value.trim(),p=$('regPassword').value;
  if(!n||n.length<1){am('reg','用户名至少 1 个字符');return}
  if(!e||!isValidEmail(e)){am('reg','请输入正确的邮箱地址');return}
  if(!p||p.length<6){am('reg','密码至少 6 位');return}
  const b=$('regBtn');b.disabled=true;b.textContent='注册中...';
  try{const r=await fetch(ORIGIN+'/v1/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d?.error||'注册失败');setAuth(d.api_key,d.name);hideAuth();refreshBal();refreshModels();toast('注册成功！送 ¥1.00','ok')}
  catch(err){am('reg',err.message)}finally{b.disabled=false;b.textContent='免费注册（送 ¥1.00）'}
}
function am(f,m){const el=$(f+'Msg');el.textContent=m;el.className='auth-msg err';setTimeout(()=>el.className='auth-msg',4000)}
function setAuth(k,n){KEY=k;NAME=n;localStorage.setItem(P+'key',k);localStorage.setItem(P+'name',n);$('sidebarUser').textContent=n;$('logoutBtn').style.display='';renderConvs()}
function doLogout(){KEY='';NAME='';CUR_CONV=null;CONVS=[];localStorage.removeItem(P+'key');localStorage.removeItem(P+'name');localStorage.removeItem(P+'convs');$('sidebarUser').textContent='未登录';$('logoutBtn').style.display='none';$('chatScroll').innerHTML='';$('convList').innerHTML='<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">暂无对话</div>';$('authOverlay').classList.remove('hide');$('balText').textContent='—'}

// ── Models ────────────────────────────────────────
async function refreshModels(){
  try{const r=await fetch(ORIGIN+'/v1/models');const d=await r.json();const models=d.data||[];if(models.length){const s=$('modelPick');const cur=s.value;s.innerHTML=models.map(m=>`<option value="${esc(m.id)}"${m.id===cur?' selected':''}>${esc(m.owned_by||'')} · ${esc(m.id)}</option>`).join('')}}catch{}
}
async function refreshBal(){
  if(!KEY)return;try{const r=await fetch(ORIGIN+'/v1/balance',{headers:{'Authorization':'Bearer '+KEY}});const d=await r.json();BAL=d.balance||0;$('balText').textContent=BAL.toFixed(2)+' 元'}catch{$('balText').textContent='—'}
}

// ── Messages ──────────────────────────────────────
function appendBubble(id,role,content,cost,tokens,state){
  const div=document.createElement('div');div.className='msg '+(role==='user'?'user':'ai');
  const avatar=role==='user'?(NAME?.[0]||'👤'):'🎓';
  const bubbleContent=state==='thinking'?'<div class="thinking"><span></span><span></span><span></span></div>':renderMd(content||'');
  div.innerHTML=`<div class="msg-avatar ${role==='user'?'u':'a'}">${avatar}</div><div class="msg-body"><div class="msg-bubble">${bubbleContent}</div><div class="msg-meta">${cost!=null&&cost>0?`<span>消耗 ¥${cost.toFixed(4)}</span>`:''}${tokens?`<span>${tokens}t</span>`:''}<button class="copy-btn" onclick="copyText('${esc(content||'').replace(/'/g,"\\'")}');toast('已复制','ok')">复制</button></div></div>`;
  $('chatScroll').appendChild(div);scrollBottom();return div
}
function updateBubble(el,content,cost,tokens,state){
  const bubble=el.querySelector('.msg-bubble');bubble.innerHTML=state==='thinking'?'<div class="thinking"><span></span><span></span><span></span></div>':renderMd(content||'');
  const meta=el.querySelector('.msg-meta');if(meta)meta.innerHTML=`${cost!=null&&cost>0?`<span>消耗 ¥${cost.toFixed(4)}</span>`:''}${tokens?`<span>${tokens}t</span>`:''}<button class="copy-btn" onclick="copyText('${esc(content||'').replace(/'/g,"\\'")}');toast('已复制','ok')">复制</button>`;
  scrollBottom()
}
function renderMd(t){if(!t)return'';let out=esc(t);out=out.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>`<pre><code>${esc(code.trim())}</code></pre>`);out=out.replace(/`([^`]+)`/g,'<code>$1</code>');out=out.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');out=out.replace(/^- (.+)$/gm,'<li>$1</li>');out=out.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');out=out.replace(/\n/g,'<br>');return out}

// ── Chat ───────────────────────────────────────────
function newChat(){CUR_CONV=null;$('chatScroll').innerHTML=`<div class="welcome" id="welcome"><div class="welcome-icon">🎓</div><h2>你好，我是你的学习助手</h2><p class="subtitle">高数 · 编程 · 论文 · 实验报告 — 我都能帮你</p><div class="welcome-prompts"><button class="prompt-chip" onclick="quickAsk('帮我用简单的方式解释微积分中的链式法则')">📐 链式法则</button><button class="prompt-chip" onclick="quickAsk('帮我写一段 Python 快速排序代码，加上注释')">💻 快速排序</button><button class="prompt-chip" onclick="quickAsk('帮我把这段文字润色得更学术')">📝 论文润色</button><button class="prompt-chip" onclick="quickAsk('用通俗的方式解释什么是机器学习')">🤖 机器学习</button><button class="prompt-chip" onclick="quickAsk('帮我写一个实验报告的模板框架')">🔬 实验报告</button><button class="prompt-chip" onclick="quickAsk('把这段英文翻译成中文')">🌐 翻译</button></div></div>`;FILE_DATA=null;$('fileBar').innerHTML='';$('chatInput').focus()}
function quickAsk(q){$('chatInput').value=q;sendMsg()}

async function sendMsg(){
  if(SENDING)return;const input=$('chatInput');const text=input.value.trim();if(!text&&!FILE_DATA)return;
  if(!KEY){$('authOverlay').classList.remove('hide');return}
  SENDING=true;const sendBtn=$('sendBtn');sendBtn.disabled=true;sendBtn.textContent='⋯';
  $('welcome')?.remove();

  let userContent=text||'';if(FILE_DATA){if(FILE_DATA.type==='text')userContent=`[文件: ${FILE_DATA.filename}]\n\n${FILE_DATA.content}\n\n${text||'请帮我分析这个文件'}`}FILE_DATA=null;$('fileBar').innerHTML='';

  // Ensure conversation exists
  if(CUR_CONV==null){CONVS.unshift({id:Date.now(),title:text.slice(0,30),msgs:[],model:CURRENT_MODEL,createdAt:new Date().toISOString()});CUR_CONV=0}
  const conv=CONVS[CUR_CONV];

  conv.msgs.push({role:'user',content:userContent,cost:0,tokens:0});
  appendBubble(Math.random(),'user',userContent,0,0,'final');
  saveConvs();renderConvs();

  input.value='';input.style.height='auto';sendBtn.disabled=true;

  const apiMsgs=[{role:'system',content:'你是 LinkPower 学习助手，专门帮助大学生解决学业问题。用中文回复，语气温暖友好，复杂问题先给思路再逐步拆解，关键信息用 **加粗** 标注。目标是让学生真正理解。'},...conv.msgs.slice(-30).map(m=>({role:m.role,content:m.content}))];

  const aiDiv=appendBubble(Math.random(),'ai','',0,0,'thinking');
  conv.msgs.push({role:'ai',content:'',cost:0,tokens:0});
  let aiContent='',aiCost=0,aiTokens=0;

  try{
    const resp=await fetch(ORIGIN+'/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify({model:conv.model||CURRENT_MODEL,messages:apiMsgs,stream:true})});
    if(!resp.ok){const err=await resp.json().catch(()=>({}));throw new Error(err?.error?.message||err?.error||`服务器错误 (${resp.status})`)}
    const reader=resp.body.getReader();const decoder=new TextDecoder();let buf='',done=false;
    while(!done){const r=await reader.read();if(r.done)break;buf+=decoder.decode(r.value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';
      for(const line of lines){const trimmed=line.trim();if(!trimmed||!trimmed.startsWith('data:'))continue;const payload=trimmed.slice(5).trim();if(payload==='[DONE]'){done=true;break}
        try{const chunk=JSON.parse(payload);const choices=chunk?.choices;if(!choices||!choices.length)continue;const delta=choices[0]?.delta;if(!delta)continue;
          if(delta.content)aiContent+=delta.content;if(delta.reasoning_content)aiContent+=delta.reasoning_content;
          if(aiContent){updateBubble(aiDiv,aiContent,null,null,'stream');conv.msgs[conv.msgs.length-1].content=aiContent}
          if(chunk?.usage){aiTokens=chunk.usage.total_tokens||0;const pt=chunk.usage.prompt_tokens||0,ct=chunk.usage.completion_tokens||0;aiCost=((pt/1e6)+(ct/1e6)*2)*1.3}
        }catch{}}}}catch(e){aiContent='请求失败：'+e.message;toast(e.message,'err')}
  aiContent=aiContent||'（收到回复，但内容为空 — 请重试）';
  conv.msgs[conv.msgs.length-1].content=aiContent;conv.msgs[conv.msgs.length-1].cost=aiCost;conv.msgs[conv.msgs.length-1].tokens=aiTokens;
  updateBubble(aiDiv,aiContent,aiCost,aiTokens,'final');
  saveConvs();renderConvs();refreshBal();
  SENDING=false;sendBtn.disabled=false;sendBtn.textContent='↑';$('chatInput').focus()
}

// ── File ──────────────────────────────────────────
async function handleFile(e){const file=e.target.files?.[0];if(!file)return;const bar=$('fileBar');bar.innerHTML=`<div class="file-tag">📄 ${esc(file.name)} — 上传中...</div>`;try{const fd=new FormData();fd.append('file',file);const h={};if(KEY)h['Authorization']='Bearer '+KEY;const r=await fetch(ORIGIN+'/v1/upload',{method:'POST',headers:h,body:fd});const d=await r.json();if(d.error)bar.innerHTML=`<div class="file-tag" style="color:var(--danger)">❌ ${esc(d.error)} <button class="rm" onclick="$('fileBar').innerHTML='';FILE_DATA=null">×</button></div>`;else{FILE_DATA=d;bar.innerHTML=`<div class="file-tag">✅ ${esc(file.name)} <button class="rm" onclick="$('fileBar').innerHTML='';FILE_DATA=null">×</button></div>`}}catch(err){bar.innerHTML=`<div class="file-tag" style="color:var(--danger)">❌ 上传失败 <button class="rm" onclick="$('fileBar').innerHTML='';FILE_DATA=null">×</button></div>`}e.target.value=''}
</script>
