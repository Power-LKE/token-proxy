<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>LinkPower · 你的学习助手</title>
<style>
/* ═══════════════════════════════════════════════════════════
   LinkPower v3 — 大学生 AI 学习助手
   设计理念：温暖、简洁、有反馈、易上手
   ═══════════════════════════════════════════════════════════ */

:root {
  --bg: #faf9f7;
  --bg-card: #ffffff;
  --bg-input: #f5f3f1;
  --bg-hover: #f0eeec;
  --text: #1c1917;
  --text-secondary: #78716c;
  --text-muted: #a8a29e;
  --border: #e7e5e4;
  --border-light: #f0efed;
  --accent: #6366f1;
  --accent-light: #eef2ff;
  --accent-dark: #4f46e5;
  --success: #059669;
  --success-light: #ecfdf5;
  --danger: #ef4444;
  --danger-light: #fef2f2;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.06);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
  --font-mono: "SF Mono", "Cascadia Code", "Fira Code", monospace;
  --transition: .2s cubic-bezier(.4,0,.2,1);
}

[data-theme="dark"] {
  --bg: #0f0f0f;
  --bg-card: #1a1a1a;
  --bg-input: #262626;
  --bg-hover: #222;
  --text: #e8e6e3;
  --text-secondary: #999;
  --text-muted: #666;
  --border: #2a2a2a;
  --border-light: #222;
  --accent: #818cf8;
  --accent-light: #1e1b4b;
  --accent-dark: #6366f1;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow: 0 1px 3px rgba(0,0,0,.4);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.5);
}

*,*::before,*::after{box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;height:100dvh;overflow:hidden}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit;font-size:inherit}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── Layout ─────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100dvh;max-width:960px;margin:0 auto}

/* ── Navbar ─────────────────────────────────────── */
.navbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;height:52px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.nav-left{display:flex;align-items:center;gap:6px}
.nav-logo{font-size:17px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:6px}
.nav-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:dot-pulse 2s infinite}
@keyframes dot-pulse{0%,100%{opacity:.5}50%{opacity:1}}
.nav-right{display:flex;align-items:center;gap:6px}
.nav-badge{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--accent-light);color:var(--accent);font-weight:500;cursor:pointer;transition:all var(--transition);border:none;display:flex;align-items:center;gap:4px}
.nav-badge:hover{background:var(--accent);color:#fff;transform:scale(1.03)}
.nav-badge:active{transform:scale(.97)}
.nav-btn{width:32px;height:32px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text-secondary);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.nav-btn:hover{background:var(--bg-hover);color:var(--text)}
.nav-btn:active{transform:scale(.93)}

/* ── Chat Area ──────────────────────────────────── */
.chat-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}
.chat-scroll{flex:1;overflow-y:auto;padding:8px 0;scroll-behavior:smooth}

/* ── Welcome ────────────────────────────────────── */
.welcome{padding:32px 20px;text-align:center;animation:fadeUp .5s ease}
.welcome-icon{font-size:48px;margin-bottom:12px;animation:bounce 3s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.welcome h2{font-size:22px;font-weight:700;margin:0 0 4px;letter-spacing:-.3px}
.welcome .subtitle{font-size:14px;color:var(--text-secondary);margin:0 0 20px;line-height:1.5}
.welcome-prompts{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:500px;margin:0 auto}
.prompt-chip{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);font-size:13px;cursor:pointer;transition:all var(--transition);white-space:nowrap}
.prompt-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);transform:translateY(-1px);box-shadow:var(--shadow)}
.prompt-chip:active{transform:scale(.97)}

/* ── Messages ───────────────────────────────────── */
.msg{padding:12px 16px;display:flex;gap:10px;animation:fadeIn .25s ease;max-width:100%}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* User message — right aligned */
.msg.user{flex-direction:row-reverse;padding-left:60px}
.msg-avatar{width:34px;height:34px;border-radius:var(--radius);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;margin-top:2px}
.msg-avatar.u{background:linear-gradient(135deg,#818cf8,#6366f1);color:#fff;border-radius:50%}
.msg-avatar.a{background:var(--bg-input);color:var(--text-secondary);border-radius:50%;font-size:18px}

.msg-bubble{max-width:82%;font-size:14px;line-height:1.65;padding:10px 14px;border-radius:var(--radius-lg);word-break:break-word}
.msg.user .msg-bubble{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(99,102,241,.25)}
.msg.ai .msg-bubble{background:var(--bg-card);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:var(--shadow-sm)}
.msg.ai .msg-bubble:hover{border-color:var(--accent);box-shadow:var(--shadow)}

.msg-bubble p{margin:4px 0}
.msg-bubble p:first-child{margin-top:0}
.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble ul,.msg-bubble ol{margin:4px 0;padding-left:18px}
.msg-bubble li{margin:2px 0}
.msg-bubble code{font-family:var(--font-mono);font-size:13px;padding:1px 5px;border-radius:4px;background:var(--bg-input)}
.msg.user .msg-bubble code{background:rgba(255,255,255,.15);color:#fff}
.msg-bubble pre{background:var(--bg-input);border-radius:var(--radius-sm);padding:12px;overflow-x:auto;margin:8px 0;font-size:13px;line-height:1.45;border:1px solid var(--border-light);position:relative}
.msg.user .msg-bubble pre{background:rgba(0,0,0,.2);border-color:rgba(255,255,255,.1)}
.msg-bubble pre code{background:none;padding:0;font-size:13px}
.msg-bubble blockquote{border-left:3px solid var(--accent);margin:8px 0;padding:2px 12px;color:var(--text-secondary);font-style:italic}

.msg-meta{display:flex;gap:8px;font-size:11px;color:var(--text-muted);margin-top:3px;align-items:center}
.msg.user .msg-meta{justify-content:flex-end;color:rgba(255,255,255,.5)}
.msg-meta .copy-msg{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:11px;padding:1px 4px;border-radius:3px;opacity:0;transition:opacity var(--transition)}
.msg.ai:hover .copy-msg{opacity:1}
.msg.user .copy-msg{color:rgba(255,255,255,.6)}
.msg.user .copy-msg:hover{color:#fff}
.copy-msg:hover{background:var(--bg-hover);color:var(--text)}

/* Thinking animation */
.thinking{display:inline-flex;gap:4px;padding:4px 0}
.thinking span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:think 1.4s infinite}
.thinking span:nth-child(2){animation-delay:.2s}
.thinking span:nth-child(3){animation-delay:.4s}
@keyframes think{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-6px);opacity:1}}

/* ── Input ──────────────────────────────────────── */
.input-area{padding:6px 12px 12px;flex-shrink:0;background:linear-gradient(to top,var(--bg) 80%,transparent)}
.input-bar{display:flex;align-items:flex-end;gap:8px;background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:6px 6px 6px 14px;transition:all var(--transition);box-shadow:var(--shadow)}
.input-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light),var(--shadow-lg)}
.input-bar textarea{flex:1;border:none;background:none;outline:none;resize:none;font-size:14px;line-height:1.5;padding:4px 0;color:var(--text);min-height:24px;max-height:120px}
.input-bar textarea::placeholder{color:var(--text-muted)}
.input-actions{display:flex;align-items:center;gap:2px;flex-shrink:0}
.input-upload{width:34px;height:34px;border-radius:50%;border:none;background:transparent;color:var(--text-muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);flex-shrink:0}
.input-upload:hover{background:var(--bg-hover);color:var(--accent);transform:scale(1.05)}
.input-send{width:38px;height:38px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);flex-shrink:0}
.input-send:hover{background:var(--accent-dark);transform:scale(1.05);box-shadow:0 2px 12px rgba(99,102,241,.35)}
.input-send:active{transform:scale(.93)}
.input-send:disabled{opacity:.35;cursor:not-allowed;pointer-events:none;transform:none;box-shadow:none}

/* ── File preview ───────────────────────────────── */
.file-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--accent-light);color:var(--accent);border-radius:20px;font-size:12px;margin:0 12px 4px;animation:fadeIn .2s ease}
.file-tag .rm{background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;padding:0 2px;opacity:.6}
.file-tag .rm:hover{opacity:1}

/* ── Toast ──────────────────────────────────────── */
#toasts{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;box-shadow:var(--shadow-lg);animation:slideIn .3s ease;pointer-events:auto;max-width:320px;background:var(--bg-card);border:1px solid var(--border);display:flex;align-items:center;gap:6px}
.toast.ok{border-left:3px solid var(--success)}
.toast.err{border-left:3px solid var(--danger)}
@keyframes slideIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}

/* ── Theme toggle ────────────────────────────────── */
.theme-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg-input);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.theme-btn:hover{background:var(--bg-hover);transform:rotate(15deg)}
.theme-btn:active{transform:scale(.9)}

/* ── Responsive ─────────────────────────────────── */
@media(max-width:640px){
  .msg{padding:8px 10px;gap:8px}
  .msg.user{padding-left:40px}
  .msg-bubble{font-size:13px;max-width:88%;padding:8px 12px}
  .welcome h2{font-size:19px}
  .welcome-icon{font-size:40px}
  .input-area{padding:4px 8px 10px}
  .input-bar{border-radius:var(--radius-lg)}
}
</style>
</head>
<body>

<div id="app">
  <!-- ── Navbar ── -->
  <nav class="navbar">
    <div class="nav-left">
      <span class="nav-logo"><span class="dot"></span>LinkPower</span>
    </div>
    <div class="nav-right">
      <span class="nav-badge" id="balanceBadge" onclick="refreshBalance()" title="点击刷新余额">⚡ <span id="balText">—</span></span>
      <button class="theme-btn" onclick="toggleTheme()" title="切换主题">🌓</button>
      <button class="nav-btn" onclick="newChat()" title="新对话">＋</button>
    </div>
  </nav>

  <!-- ── Chat ── -->
  <div class="chat-wrap">
    <div class="chat-scroll" id="chatScroll">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🎓</div>
        <h2>你好，我是你的学习助手</h2>
        <p class="subtitle">无论是高数、编程、论文还是实验报告<br>我都能帮你理清思路、一步步解决问题</p>
        <div class="welcome-prompts">
          <button class="prompt-chip" onclick="quickAsk('帮我解释一下微积分中的链式法则')">📐 链式法则</button>
          <button class="prompt-chip" onclick="quickAsk('帮我写一段 Python 快速排序代码')">💻 快速排序</button>
          <button class="prompt-chip" onclick="quickAsk('帮我润色这段论文摘要，让它更学术')">📝 论文润色</button>
          <button class="prompt-chip" onclick="quickAsk('用简单的方式解释什么是机器学习')">🤖 机器学习</button>
          <button class="prompt-chip" onclick="quickAsk('帮我把这段英文翻译成中文')">🌐 翻译</button>
          <button class="prompt-chip" onclick="quickAsk('帮我写一个实验报告的模板框架')">🔬 实验报告</button>
        </div>
      </div>
    </div>

    <!-- File preview -->
    <div id="fileBar"></div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-bar">
        <textarea id="chatInput" rows="1" placeholder="输入你的问题，比如「帮我分析这道高数题」..." onkeydown="onKey(event)" oninput="autoResize()"></textarea>
        <div class="input-actions">
          <button class="input-upload" id="uploadBtn" onclick="triggerUpload()" title="上传文件">📎</button>
          <button class="input-send" id="sendBtn" onclick="sendMsg()" disabled title="发送">↑</button>
        </div>
        <input type="file" id="fileInput" hidden onchange="handleFile(event)">
      </div>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
// ═════════════════════════════════════════════════════
// State
// ═════════════════════════════════════════════════════
let KEY = '', NAME = '', BAL = 0, SENDING = false;
let MESSAGES = [];        // Current conversation
let FILE_DATA = null;
let STORAGE_PREFIX = 'lp3_';

// ═════════════════════════════════════════════════════
// Init
// ═════════════════════════════════════════════════════
(function init() {
  KEY = localStorage.getItem(STORAGE_PREFIX+'key') || '';
  NAME = localStorage.getItem(STORAGE_PREFIX+'name') || '';
  if (KEY) { showChat(); refreshBalance(); }
  // Load saved messages
  try { MESSAGES = JSON.parse(localStorage.getItem(STORAGE_PREFIX+'msgs')||'[]'); } catch {}
  if (MESSAGES.length > 0) {
    $('welcome').style.display = 'none';
    MESSAGES.forEach(m => appendBubble(m.role, m.content, m.cost, m.tokens, m.model, false));
    scrollBottom();
  }
  // Theme
  const saved = localStorage.getItem(STORAGE_PREFIX+'theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();

// ═════════════════════════════════════════════════════
// Helpers
// ═════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]||c));

async function copyText(txt) {
  try { await navigator.clipboard.writeText(txt); return true; } catch { return false; }
}

function toast(msg, ok) {
  const el = document.createElement('div');
  el.className = 'toast ' + (ok ? 'ok' : 'err');
  el.textContent = msg;
  $('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2800);
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(STORAGE_PREFIX+'theme', next);
}

function scrollBottom() {
  setTimeout(() => { const s = $('chatScroll'); s.scrollTop = s.scrollHeight; }, 50);
}

// ═════════════════════════════════════════════════════
// Auth
// ═════════════════════════════════════════════════════
function showChat() {
  // Landing page removed — app IS chat. Just show welcome if no key.
  if (!KEY) {
    // Auto-register guest-like: prompt for name
    autoRegister();
  }
}

async function autoRegister() {
  // Simple: generate a guest key
  const name = '同学' + Math.random().toString(36).slice(2,6);
  const email = name + '@guest.linkpower';
  const password = Math.random().toString(36).slice(2,10);
  try {
    const r = await fetch(origin() + '/v1/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, email, password})
    });
    const d = await r.json();
    if (d.api_key) { setCredentials(d.api_key, d.name); showChat(); refreshBalance(); }
  } catch {}
}

function setCredentials(key, name) {
  KEY = key; NAME = name;
  localStorage.setItem(STORAGE_PREFIX+'key', key);
  localStorage.setItem(STORAGE_PREFIX+'name', name);
}

function origin() { return window.location.origin; }

async function refreshBalance() {
  if (!KEY) return;
  try {
    const r = await fetch(origin()+'/v1/balance', {headers:{'Authorization':'Bearer '+KEY}});
    const d = await r.json();
    BAL = d.balance || 0;
    $('balText').textContent = BAL.toFixed(2) + ' 元';
  } catch { $('balText').textContent = '—'; }
}

function quickAsk(q) {
  $('chatInput').value = q;
  sendMsg();
}

// ═════════════════════════════════════════════════════
// Messages
// ═════════════════════════════════════════════════════
function appendBubble(role, content, cost, tokens, model, animate) {
  if (animate === undefined) animate = true;
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatarChar = role === 'user' ? (NAME?.[0]||'👤') : '🎓';
  const avatarCls = role === 'user' ? 'u' : 'a';
  div.innerHTML = `<div class="msg-avatar ${avatarCls}">${avatarChar}</div>
    <div class="msg-bubble">${renderMd(content)}</div>
    <div class="msg-meta">
      ${role === 'ai' && cost ? `<span>消耗 ¥${cost.toFixed(4)}</span>` : ''}
      ${role === 'ai' && tokens ? `<span>${tokens} tokens</span>` : ''}
      <button class="copy-msg" onclick="copyText('${esc(content).replace(/'/g,"\\'")}');toast('已复制',1)">复制</button>
    </div>`;
  if (!animate) div.style.animation = 'none';
  $('chatScroll').appendChild(div);
  scrollBottom();
}

function renderMd(t) {
  let out = esc(t);
  // Code blocks
  out = out.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code) =>
    `<pre><code>${esc(code.trim())}</code></pre>`);
  // Inline code
  out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Headers
  out = out.replace(/^### (.+)$/gm, '<h3 style="font-size:15px;margin:8px 0">$1</h3>');
  out = out.replace(/^## (.+)$/gm, '<h3 style="font-size:16px;margin:10px 0">$1</h3>');
  out = out.replace(/^# (.+)$/gm, '<h2 style="font-size:17px;margin:12px 0">$1</h2>');
  // Lists
  out = out.replace(/^- (.+)$/gm, '<li>$1</li>');
  out = out.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Blockquote
  out = out.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Links
  out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Line breaks
  out = out.replace(/\n/g, '<br>');
  return out;
}

function newChat() {
  MESSAGES = [];
  localStorage.setItem(STORAGE_PREFIX+'msgs', '[]');
  $('chatScroll').innerHTML = `<div class="welcome" id="welcome">
    <div class="welcome-icon">🎓</div>
    <h2>你好，我是你的学习助手</h2>
    <p class="subtitle">无论是高数、编程、论文还是实验报告<br>我都能帮你理清思路、一步步解决问题</p>
    <div class="welcome-prompts">
      <button class="prompt-chip" onclick="quickAsk('帮我解释一下微积分中的链式法则')">📐 链式法则</button>
      <button class="prompt-chip" onclick="quickAsk('帮我写一段 Python 快速排序代码')">💻 快速排序</button>
      <button class="prompt-chip" onclick="quickAsk('帮我润色这段论文摘要，让它更学术')">📝 论文润色</button>
      <button class="prompt-chip" onclick="quickAsk('用简单的方式解释什么是机器学习')">🤖 机器学习</button>
      <button class="prompt-chip" onclick="quickAsk('帮我把这段英文翻译成中文')">🌐 翻译</button>
      <button class="prompt-chip" onclick="quickAsk('帮我写一个实验报告的模板框架')">🔬 实验报告</button>
    </div></div>`;
  FILE_DATA = null;
  $('fileBar').innerHTML = '';
  $('chatInput').focus();
}

// ═════════════════════════════════════════════════════
// Send
// ═════════════════════════════════════════════════════
async function sendMsg() {
  if (SENDING) return;
  const input = $('chatInput');
  const text = input.value.trim();
  if (!text && !FILE_DATA) return;

  // Ensure we have a key
  if (!KEY) {
    await autoRegister();
    if (!KEY) { toast('连接失败，请刷新重试', 0); return; }
  }

  SENDING = true;
  $('sendBtn').disabled = true;
  $('sendBtn').textContent = '⋯';

  // Hide welcome
  const w = $('welcome'); if (w) w.style.display = 'none';

  // Build user content
  let userContent = text || '';
  if (FILE_DATA) {
    if (FILE_DATA.type === 'text') userContent = `[文件: ${FILE_DATA.filename}]\n${FILE_DATA.content}\n\n${text || '请帮我分析这个文件'}`;
    else if (FILE_DATA.type === 'image') userContent = text || '请帮我分析这张图片';
  }
  FILE_DATA = null;
  $('fileBar').innerHTML = '';

  // Append user bubble
  appendBubble('user', userContent);
  MESSAGES.push({role:'user', content: userContent});
  saveMsgs();

  input.value = '';
  input.style.height = 'auto';
  $('sendBtn').disabled = true;

  // Build API messages
  const systemPrompt = `你是 LinkPower 学习助手，一个专门帮助大学生解决学业问题的 AI。你的特点是：
- 用中文回复，语气温暖友好，像学长学姐一样
- 对于复杂问题，先给出思路框架，再逐步拆解
- 数学题写出推导过程，代码题加上注释说明
- 论文和报告类问题给出结构模板和写作建议
- 如果问题信息不足，主动追问细节，而不是猜测
- 回答长度适中，关键信息用加粗标注
- 涉及计算时，用代码块展示公式或代码
你的目标是让学生真正理解，而不只是给答案。`;

  const apiMsgs = [
    {role:'system', content: systemPrompt},
    ...MESSAGES.slice(-30).map(m => ({role: m.role, content: m.content}))
  ];

  // Insert thinking indicator
  const thinkDiv = document.createElement('div');
  thinkDiv.className = 'msg ai';
  thinkDiv.innerHTML = `<div class="msg-avatar a">🎓</div><div class="msg-bubble"><div class="thinking"><span></span><span></span><span></span></div></div>`;
  $('chatScroll').appendChild(thinkDiv);
  scrollBottom();

  let aiContent = '';
  let aiCost = 0;
  let aiTokens = 0;

  try {
    const resp = await fetch(origin()+'/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+KEY},
      body: JSON.stringify({model:'deepseek-chat',messages:apiMsgs,stream:true})
    });

    if (!resp.ok) {
      const err = await resp.json().catch(()=>({}));
      throw new Error(err?.error?.message || `HTTP ${resp.status}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream:true});
      const lines = buf.split('\n');
      buf = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') break;
        try {
          const chunk = JSON.parse(payload);
          const delta = chunk?.choices?.[0]?.delta;
          if (delta?.content) {
            aiContent += delta.content;
            // Update the thinking bubble in-place
            const bubble = thinkDiv.querySelector('.msg-bubble');
            bubble.innerHTML = renderMd(aiContent) || '<span class="thinking"><span></span><span></span><span></span></span>';
          }
        } catch {}
      }
      scrollBottom();
    }

    // Final content (fallback if empty)
    if (!aiContent.trim()) aiContent = '（收到回复但内容为空，请重试）';

    // Replace thinking with final
    thinkDiv.querySelector('.msg-bubble').innerHTML = renderMd(aiContent);
    // Add meta
    const meta = thinkDiv.querySelector('.msg-meta');
    if (!meta) {
      const m = document.createElement('div');
      m.className = 'msg-meta';
      m.innerHTML = `<span>消耗 ¥${aiCost.toFixed(4)}</span><span>${aiTokens} tokens</span><button class="copy-msg" onclick="copyText('${esc(aiContent).replace(/'/g,"\\'")}');toast('已复制',1)">复制</button>`;
      thinkDiv.appendChild(m);
    }

    MESSAGES.push({role:'ai', content: aiContent, cost: aiCost, tokens: aiTokens});
    saveMsgs();
    refreshBalance();

  } catch (e) {
    thinkDiv.querySelector('.msg-bubble').innerHTML = `<span style="color:var(--danger)">请求失败：${esc(e.message)}</span>`;
    toast(e.message, 0);
  }

  SENDING = false;
  $('sendBtn').disabled = false;
  $('sendBtn').textContent = '↑';
  input.focus();
}

function saveMsgs() {
  localStorage.setItem(STORAGE_PREFIX+'msgs', JSON.stringify(MESSAGES.slice(-50)));
}

// ═════════════════════════════════════════════════════
// File Upload
// ═════════════════════════════════════════════════════
function triggerUpload() { $('fileInput').click(); }

async function handleFile(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  const bar = $('fileBar');
  bar.innerHTML = `<div class="file-tag">📄 ${esc(file.name)} — 上传中...</div>`;
  try {
    const fd = new FormData(); fd.append('file', file);
    const r = await fetch(origin()+'/v1/upload', {method:'POST',body:fd,headers:KEY?{'Authorization':'Bearer '+KEY}:{}});
    FILE_DATA = await r.json();
    bar.innerHTML = FILE_DATA.error
      ? `<div class="file-tag" style="color:var(--danger)">❌ ${esc(FILE_DATA.error)} <button class="rm" onclick="FILE_DATA=null;$('fileBar').innerHTML=''">×</button></div>`
      : `<div class="file-tag">✅ ${esc(file.name)} <button class="rm" onclick="FILE_DATA=null;$('fileBar').innerHTML=''">×</button></div>`;
  } catch (err) {
    bar.innerHTML = `<div class="file-tag" style="color:var(--danger)">❌ 上传失败 <button class="rm" onclick="$('fileBar').innerHTML=''">×</button></div>`;
  }
  e.target.value = '';
}

// ═════════════════════════════════════════════════════
// Keyboard
// ═════════════════════════════════════════════════════
function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}
function autoResize() {
  const ta = $('chatInput');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}
</script>
</body>
</html>
