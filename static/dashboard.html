<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LinkPower 用户面板</title>
<link rel="stylesheet" href="/static/css/design-system.css">
<style>
body{background:var(--bg-primary);min-height:100vh}
.navbar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.navbar-brand{font-size:16px;font-weight:700}
.navbar-brand span{color:var(--accent)}
.navbar-links{display:flex;gap:8px}
.container{max-width:860px;margin:0 auto;padding:32px 24px}
</style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand">Link<span>Power</span></a>
  <div class="navbar-links">
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>
</nav>

<div class="container">
  <!-- Auth Section -->
  <div id="authSection">
    <div class="card" style="max-width:440px;margin:60px auto">
      <div class="tabs" id="authTabs">
        <button class="tab active" onclick="swTab('login')">已有 API Key</button>
        <button class="tab" onclick="swTab('register')">注册新账号</button>
      </div>
      <div id="loginPane">
        <div class="form-group"><label class="form-label">邮箱</label><input class="form-input" type="email" id="loginEmail" placeholder="your@email.com"></div>
        <div class="form-group"><label class="form-label">密码</label><input class="form-input" type="password" id="loginPassword" placeholder="至少 6 位"></div>
        <button class="btn btn-primary w-full" id="loginBtn" onclick="doLogin()">登录</button>
        <div class="form-error mt-2 hidden" id="loginError"></div>
      </div>
      <div id="registerPane" class="hidden">
        <div class="form-group"><label class="form-label">用户名</label><input class="form-input" id="regName" placeholder="你的昵称"></div>
        <div class="form-group"><label class="form-label">邮箱</label><input class="form-input" type="email" id="regEmail" placeholder="your@email.com"></div>
        <div class="form-group"><label class="form-label">密码</label><input class="form-input" type="password" id="regPassword" placeholder="至少 6 位"></div>
        <button class="btn btn-primary w-full" id="regBtn" onclick="doRegister()">免费注册</button>
        <div class="form-error mt-2 hidden" id="regError"></div>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashSection" class="hidden">
    <div class="grid-2 mb-6">
      <div class="stat-card">
        <div class="stat-label">当前余额</div>
        <div class="stat-value" style="font-size:36px" id="dashBalance">—</div>
        <div class="stat-sub" id="dashStatus"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">API Key</div>
        <div class="stat-value text-mono" style="font-size:15px" id="dashKey" onclick="copyToClipboard(this.textContent).then(()=>showToast('已复制','success'))" title="点击复制">—</div>
        <div class="stat-sub text-muted">点击复制</div>
      </div>
    </div>

    <div class="grid-2 mb-6">
      <div class="card">
        <div class="card-header"><h3>快速接入</h3></div>
        <p class="text-sm text-muted mb-2">API 地址</p>
        <div class="code-block"><div class="code-block-body"><code id="codeUrl">—</code></div></div>
        <p class="text-sm text-muted mb-2 mt-4">Python 示例</p>
        <div class="code-block"><div class="code-block-body"><code id="codePython">—</code></div></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>模型定价</h3></div>
        <div id="modelPricing"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h3>交易记录</h3></div>
      <div id="txList"><div class="empty-state"><div class="empty-state-desc">暂无交易记录</div></div></div>
    </div>

    <div class="text-center mt-6">
      <button class="btn btn-danger btn-sm" onclick="authApi.logout();location.reload()">退出登录</button>
    </div>
  </div>
</div>

<script src="/static/js/utils.js"></script>
<script src="/static/js/api.js"></script>
<script>
function swTab(t) {
  document.querySelectorAll('#authTabs .tab').forEach(x=>x.classList.remove('active'));
  if(t==='login'){$('loginPane').classList.remove('hidden');$('registerPane').classList.add('hidden');document.querySelector('#authTabs .tab:first-child').classList.add('active')}
  else{$('registerPane').classList.remove('hidden');$('loginPane').classList.add('hidden');document.querySelector('#authTabs .tab:last-child').classList.add('active')}
}

async function doLogin() {
  const e=$('loginEmail').value.trim(),p=$('loginPassword').value;
  if(!e||!e.includes('@')){$('loginError').textContent='请输入有效邮箱';$('loginError').classList.remove('hidden');return}
  if(!p||p.length<6){$('loginError').textContent='密码至少6位';$('loginError').classList.remove('hidden');return}
  $('loginBtn').disabled=true;$('loginBtn').textContent='登录中...';
  try{await authApi.login(e,p);$('loginError').classList.add('hidden');showDashboard()}
  catch(err){$('loginError').textContent=err.message;$('loginError').classList.remove('hidden')}
  finally{$('loginBtn').disabled=false;$('loginBtn').textContent='登录'}
}

async function doRegister() {
  const n=$('regName').value.trim(),e=$('regEmail').value.trim(),p=$('regPassword').value;
  if(!n){$('regError').textContent='请输入用户名';$('regError').classList.remove('hidden');return}
  if(!e||!e.includes('@')){$('regError').textContent='请输入有效邮箱';$('regError').classList.remove('hidden');return}
  if(!p||p.length<6){$('regError').textContent='密码至少6位';$('regError').classList.remove('hidden');return}
  $('regBtn').disabled=true;$('regBtn').textContent='注册中...';
  try{await authApi.register(n,e,p);$('regError').classList.add('hidden');showDashboard();showToast('注册成功！已赠送余额','success')}
  catch(err){$('regError').textContent=err.message;$('regError').classList.remove('hidden')}
  finally{$('regBtn').disabled=false;$('regBtn').textContent='免费注册'}
}

async function showDashboard() {
  $('authSection').classList.add('hidden');$('dashSection').classList.remove('hidden');
  try{
    const d=await userApi.query();
    $('dashBalance').textContent=formatBalance(d.balance);
    $('dashKey').textContent=LP_KEY;
    $('dashStatus').innerHTML=`<span class="badge ${d.is_active?'badge-success':'badge-danger'}">${d.is_active?'正常':'已禁用'}</span>`;
    $('codeUrl').textContent=origin();
    $('codePython').textContent=`import openai\nclient = openai.OpenAI(\n    api_key="${LP_KEY}",\n    base_url="${origin()}/v1"\n)\nresponse = client.chat.completions.create(\n    model="deepseek-chat",\n    messages=[{"role":"user","content":"Hi"}]\n)\nprint(response.choices[0].message.content)`;
    const txns=(d.transactions||[]).slice(0,30);
    if(txns.length){$('txList').innerHTML=`<div class="table-wrap"><table><thead><tr><th>时间</th><th>类型</th><th>金额</th><th>模型</th><th>Token</th></tr></thead><tbody>${txns.map(t=>`<tr><td>${formatDate(t.time)}</td><td><span class="badge ${t.type==='usage'?'badge-danger':'badge-success'}">${escHtml(t.type)}</span></td><td>${formatBalance(t.amount)}</td><td>${escHtml(t.model||'')}</td><td>${formatTokens(t.tokens)}</td></tr>`).join('')}</tbody></table></div>`}
    try{
      const models=await modelApi.list();
      if(models.length){$('modelPricing').innerHTML=models.map(m=>`<div class="flex justify-between items-center py-1" style="border-bottom:1px solid var(--border-light)"><span class="text-sm">${escHtml(m.id)}</span><span class="badge badge-accent">¥${m.price_per_1m_input||'—'}/1M</span></div>`).join('')}
    }catch{}
  }catch(e){showToast('加载失败: '+e.message,'error')}
}

if(isLoggedIn()) showDashboard();
</script>
</body>
</html>
