<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TokenProxy AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#0f0f1a;color:#e0e0e0;height:100vh;overflow:hidden}
#authPage{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px}
.auth-box{background:#1a1a2e;border-radius:16px;padding:40px;width:400px;max-width:100%;text-align:center}
.auth-box h1{color:#fff;font-size:24px;margin-bottom:4px}
.auth-box .sub{color:#888;font-size:14px;margin-bottom:24px}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;background:#252540;border-radius:8px;overflow:hidden}
.auth-tabs button{flex:1;padding:10px;border:none;background:transparent;color:#888;cursor:pointer;font-size:14px;transition:all .2s}
.auth-tabs button.active{background:#4f46e5;color:#fff}
.auth-box input{background:#252540;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;padding:12px 16px;width:100%;margin-bottom:12px;outline:none}
.auth-box input:focus{border-color:#4f46e5}
.auth-box .auth-btn{background:#4f46e5;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:15px;padding:12px;width:100%}
.auth-box .auth-btn:hover{background:#4338ca}
.auth-box .auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-msg{background:rgba(239,68,68,.15);border:1px solid #ef4444;border-radius:6px;color:#fca5a5;font-size:13px;margin-top:12px;padding:8px;display:none}
.auth-msg.success{background:rgba(34,197,94,.15);border-color:#22c55e;color:#86efac}
.auth-footer{color:#666;font-size:12px;margin-top:16px}
#chatPage{display:none;height:100vh;flex-direction:column}
.top-bar{display:flex;align-items:center;padding:12px 20px;background:#14142a;border-bottom:1px solid #1e1e3a;gap:12px}
.top-left{display:flex;align-items:center;gap:12px}
.sidebar-toggle{background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px;display:none}
.logo-text{color:#fff;font-size:16px;font-weight:600}
.top-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.top-right select{background:#252540;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:13px;padding:6px 10px;outline:none;cursor:pointer}
.user-btn{background:#252540;border:1px solid #333;border-radius:6px;color:#888;cursor:pointer;font-size:12px;padding:6px 12px}
.user-btn:hover{border-color:#ef4444;color:#ef4444}
.chat-container{display:flex;flex:1;overflow:hidden}
.sidebar{width:240px;background:#14142a;border-right:1px solid #1e1e3a;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.new-chat-btn{background:#4f46e5;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;padding:10px 16px;margin:12px}
.new-chat-btn:hover{background:#4338ca}
#conversationList{flex:1;overflow-y:auto;padding:0 8px}
.conv-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#888;margin-bottom:2px;transition:all .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item:hover{background:#1e1e3a;color:#e0e0e0}
.conv-item.active{background:#252540;color:#fff}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:20px}
.welcome-msg{text-align:center;padding:60px 20px;color:#666}
.welcome-msg h2{color:#fff;font-size:28px;margin-bottom:8px}
.msg-row{display:flex;margin-bottom:20px;gap:12px;max-width:800px;margin-left:auto;margin-right:auto;width:100%}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-avatar.user{background:#4f46e5;color:#fff}
.msg-avatar.ai{background:#1e1e3a;color:#a5b4fc}
.msg-bubble{background:#1a1a2e;border-radius:12px;padding:12px 16px;font-size:14px;line-height:1.6;max-width:85%;word-wrap:break-word}
.msg-row.user .msg-bubble{background:#4f46e5;color:#fff}
.msg-bubble pre{background:#0f0f1a;border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0;font-size:13px}
.msg-bubble code{font-family:"Cascadia Code","Fira Code",monospace;font-size:13px}
.input-area{display:flex;gap:8px;padding:12px 20px 20px;max-width:800px;margin:0 auto;width:100%}
.input-area textarea{flex:1;background:#1a1a2e;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;padding:12px 16px;outline:none;resize:none;min-height:48px;max-height:150px}
.input-area textarea:focus{border-color:#4f46e5}
.input-area .send-btn{background:#4f46e5;border:none;border-radius:12px;color:#fff;cursor:pointer;padding:12px 24px;font-size:14px;flex-shrink:0;align-self:flex-end}
.input-area .send-btn:disabled{opacity:.5}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:inline-block;width:16px;height:16px;border:2px solid #4f46e5;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:52px;bottom:0;z-index:100;width:220px;display:none}
  .sidebar.show{display:flex}
  .sidebar-toggle{display:block}
}
</style>
</head>
<body>

<div id="authPage">
<div class="auth-box">
  <h1>TokenProxy AI</h1>
  <p class="sub">AI对话助手 - 即开即用</p>
  <div class="auth-tabs">
    <button id="tabLogin" class="active" onclick="switchAuth('login')">登录</button>
    <button id="tabReg" onclick="switchAuth('register')">注册</button>
  </div>
  <div id="loginForm">
    <input type="email" id="loginEmail" placeholder="邮箱地址" autocomplete="email">
    <button class="auth-btn" onclick="login()" id="loginBtn">登录</button>
  </div>
  <div id="registerForm" style="display:none">
    <input type="text" id="regName" placeholder="设置昵称" autocomplete="off">
    <input type="email" id="regEmail" placeholder="邮箱地址" autocomplete="email">
    <button class="auth-btn" onclick="register()" id="regBtn">注册</button>
  </div>
  <div id="authMsg" class="auth-msg"></div>
  <div class="auth-footer">注册即送1元体验金 - 无需配置，开聊即用</div>
</div>
</div>

<div id="chatPage">
<div class="top-bar">
  <div class="top-left">
    <button class="sidebar-toggle" onclick="sidebarToggle()">☰</button>
    <span class="logo-text">TokenProxy AI</span>
  </div>
  <div class="top-right">
    <span id="balanceDisplay" style="color:#a5b4fc;font-size:13px">余额: 0.00</span>
    <span id="userNameDisplay" style="color:#888;font-size:12px;margin:0 4px"></span>
    <select id="modelSelect">
      <option value="deepseek-v4-flash">标准版 (v4-flash)</option>
      <option value="deepseek-v4-pro">专业版 (v4-pro)</option>
      <option value="deepseek-reasoner">专家版 (reasoner)</option>
    </select>
    <button class="user-btn" onclick="logout()">退出</button>
  </div>
</div>
<div class="chat-container">
<div id="sidebar" class="sidebar">
  <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
  <div id="conversationList"></div>
</div>
<div class="main-area">
<div id="chatMessages" class="chat-messages">
<div class="welcome-msg">
  <h2>开始对话</h2>
  <p>选择模型，输入你的问题</p>
</div>
</div>
<div class="input-area">
  <textarea id="chatInput" rows="1" placeholder="输入消息，Enter发送" onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
</div>
</div>
</div>
</div>

<script>
var API_KEY = localStorage.getItem("tp_token")||"";
var USER_NAME = localStorage.getItem("tp_name")||"";
var CURRENT_CONV = null;
var CONVERSATIONS = JSON.parse(localStorage.getItem("tp_convs")||"[]");
var IS_SENDING = false;
var BALANCE = 0;
if(API_KEY){showChat();loadBalance();renderConversations();}

function qs(id){return document.getElementById(id);}
function showMsg(msg,ok){
  var el=qs("authMsg");
  if(msg){el.textContent=msg;el.style.display="block";el.className="auth-msg"+(ok?" success":"");}
  else{el.style.display="none";}
}
function switchAuth(tab){
  qs("tabLogin").className=tab=="login"?"active":"";
  qs("tabReg").className=tab=="register"?"active":"";
  qs("loginForm").style.display=tab=="login"?"block":"none";
  qs("registerForm").style.display=tab=="register"?"block":"none";
  showMsg(null);
}

async function login(){
  var email=qs("loginEmail").value.trim().toLowerCase();
  var btn=qs("loginBtn");
  if(!email||!email.includes("@")){showMsg("请输入有效的邮箱地址");return;}
  btn.disabled=true;btn.textContent="登录中...";showMsg(null);
  try{
    var r=await fetch("/v1/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email})});
    var d=await r.json();
    if(d.error){showMsg(d.error);return;}
    doLogin(d.api_key,d.name,d.balance);
  }catch(e){showMsg("请求失败: "+e.message);}
  finally{btn.disabled=false;btn.textContent="登录";}
}

async function register(){
  var name=qs("regName").value.trim();
  var email=qs("regEmail").value.trim().toLowerCase();
  var btn=qs("regBtn");
  if(!name){showMsg("请输入昵称");return;}
  if(!email||!email.includes("@")){showMsg("请输入有效的邮箱地址");return;}
  btn.disabled=true;btn.textContent="注册中...";showMsg(null);
  try{
    var r=await fetch("/v1/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,email})});
    var d=await r.json();
    if(d.error){showMsg(d.error);return;}
    doLogin(d.api_key,d.name,d.balance);
  }catch(e){showMsg("请求失败: "+e.message);}
  finally{btn.disabled=false;btn.textContent="注册";}
}

function doLogin(key,name,balance){
  API_KEY=key;USER_NAME=name;
  localStorage.setItem("tp_token",key);
  localStorage.setItem("tp_name",name);
  showChat();
  qs("userNameDisplay").textContent=name;
  BALANCE=balance||0;
  qs("balanceDisplay").textContent="余额: "+BALANCE.toFixed(4);
  renderConversations();
}

function showChat(){
  qs("authPage").style.display="none";
  qs("chatPage").style.display="flex";
}

function logout(){
  API_KEY="";USER_NAME="";
  localStorage.removeItem("tp_token");
  localStorage.removeItem("tp_name");
  qs("chatPage").style.display="none";
  qs("authPage").style.display="flex";
  qs("loginEmail").value="";
}

function sidebarToggle(){
  qs("sidebar").classList.toggle("show");
}

async function loadBalance(){
  if(!API_KEY)return;
  try{
    var r=await fetch("/v1/balance",{headers:{"Authorization":"Bearer "+API_KEY}});
    var d=await r.json();
    if(d.balance!==undefined){BALANCE=d.balance;qs("balanceDisplay").textContent="余额: "+BALANCE.toFixed(4);}
  }catch(e){}
}

function renderConversations(){
  var el=qs("conversationList");
  el.innerHTML=CONVERSATIONS.map(function(c,i){
    var act=CURRENT_CONV&&CURRENT_CONV.id===c.id?"active":"";
    return "<div class='conv-item "+act+"' onclick='switchConv("+i+")'>"+c.title+"<span class='del-btn' onclick='event.stopPropagation();deleteConv("+i+")'>×</span></div>";
  }).join("");
}

function newChat(){
  CURRENT_CONV={id:Date.now(),title:"新对话",messages:[]};
  renderConversations();
  renderMessages();
}

function switchConv(idx){
  CURRENT_CONV=CONVERSATIONS[idx];
  renderConversations();
  renderMessages();
  qs("sidebar").classList.remove("show");
}

function deleteConv(idx){
  CONVERSATIONS.splice(idx,1);
  if(CURRENT_CONV&&CURRENT_CONV===CONVERSATIONS[idx])CURRENT_CONV=null;
  else if(CURRENT_CONV&&CONVERSATIONS.indexOf(CURRENT_CONV)<0)CURRENT_CONV=null;
  localStorage.setItem("tp_convs",JSON.stringify(CONVERSATIONS));
  renderConversations();
  renderMessages();
}

function renderMessages(){
  var el=qs("chatMessages");
  if(!CURRENT_CONV||!CURRENT_CONV.messages||CURRENT_CONV.messages.length===0){
    el.innerHTML="<div class='welcome-msg'><h2>开始对话</h2><p>输入消息开始聊天</p></div>";
    return;
  }
  el.innerHTML=CURRENT_CONV.messages.map(function(m){
    if(m.role==="system")return"";
    var isUser=m.role==="user";
    return "<div class='msg-row "+(isUser?"user":"ai")+"'><div class='msg-avatar "+(isUser?"user":"ai")+"'>"+(isUser?"U":"AI")+"</div><div class='msg-bubble'>"+renderMd(m.content)+"</div></div>";
  }).join("");
  el.scrollTop=el.scrollHeight;
}

function renderMd(t){
  if(!t)return"";
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/```(\w*)\n([\s\S]*?)```/g,"<pre><code>$2</code></pre>")
    .replace(/\`([^`]+)\`/g,"<code>$1</code>")
    .replace(/\n/g,"<br>");
}

async function sendMessage(){
  var input=qs("chatInput");
  var text=input.value.trim();
  if(!text||IS_SENDING)return;
  if(!API_KEY){alert("请先登录");return;}
  if(!CURRENT_CONV)newChat();
  if(CURRENT_CONV.messages.length===0){
    CURRENT_CONV.title=text.substring(0,20)+(text.length>20?"...":"");
  }
  var model=qs("modelSelect").value;
  CURRENT_CONV.messages.push({role:"user",content:text});
  input.value="";input.style.height="auto";
  renderMessages();
  if(!CONVERSATIONS.includes(CURRENT_CONV))CONVERSATIONS.push(CURRENT_CONV);
  renderConversations();
  localStorage.setItem("tp_convs",JSON.stringify(CONVERSATIONS));
  IS_SENDING=true;qs("sendBtn").disabled=true;qs("sendBtn").textContent="...";
  var el=qs("chatMessages");
  el.innerHTML+="<div class='msg-row ai' id='aiMsg'><div class='msg-avatar ai'>AI</div><div class='msg-bubble'><span class='loading'></span></div></div>";
  el.scrollTop=el.scrollHeight;
  try{
    var r=await fetch("/v1/chat/completions",{
      method:"POST",
      headers:{"Authorization":"Bearer "+API_KEY,"Content-Type":"application/json"},
      body:JSON.stringify({model:model,messages:CURRENT_CONV.messages.filter(function(m){return m.role!="system";}),stream:true})
    });
    var aiMsg=qs("aiMsg");
    var bubble=aiMsg.querySelector(".msg-bubble");
    var content="";
    if(r.headers.get("content-type")?.includes("text/event-stream")){
      var reader=r.body.getReader();
      var decoder=new TextDecoder();
      var buf="";
      while(true){
        var res=await reader.read();
        if(res.done)break;
        buf+=decoder.decode(res.value,{stream:true});
        var lines=buf.split("\n");
        buf=lines.pop()||"";
        for(var line of lines){
          line=line.trim();
          if(line.startsWith("data: ")&&line!=="data: [DONE]"){
            try{
              var json=JSON.parse(line.substring(6));
              var delta=json.choices?.[0]?.delta||{};
              if(delta.content)content+=delta.content;
              bubble.innerHTML=renderMd(content);
            }catch(e){}
          }
        }
        el.scrollTop=el.scrollHeight;
      }
    }else{
      var json=await r.json();
      content=json.choices?.[0]?.message?.content||"";
      bubble.innerHTML=renderMd(content);
    }
    CURRENT_CONV.messages.push({role:"assistant",content:content});
    renderMessages();localStorage.setItem("tp_convs",JSON.stringify(CONVERSATIONS));
    loadBalance();
  }catch(e){
    var aiMsg=qs("aiMsg");
    if(aiMsg)aiMsg.querySelector(".msg-bubble").innerHTML="请求失败";
  }
  IS_SENDING=false;qs("sendBtn").disabled=false;qs("sendBtn").textContent="发送";
  qs("chatInput").focus();
}
qs("chatInput").addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,150)+"px";});
</script>
</body>
</html>
