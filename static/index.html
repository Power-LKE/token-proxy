<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TokenProxy AI ??</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#0f0f1a;color:#e0e0e0;height:100vh;overflow:hidden}

/* Auth Page */
#authPage{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px}
.auth-box{background:#1a1a2e;border-radius:16px;padding:40px;width:400px;max-width:100%;text-align:center}
.auth-box h1{color:#fff;font-size:24px;margin-bottom:4px}
.auth-box .sub{color:#888;font-size:14px;margin-bottom:24px}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;background:#252540;border-radius:8px;overflow:hidden}
.auth-tabs button{flex:1;padding:10px;border:none;background:transparent;color:#888;cursor:pointer;font-size:14px;transition:all .2s}
.auth-tabs button.active{background:#4f46e5;color:#fff}
.auth-box input{background:#252540;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;padding:12px 16px;width:100%;margin-bottom:12px;outline:none}
.auth-box input:focus{border-color:#4f46e5}
.auth-box .auth-btn{background:#4f46e5;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:15px;padding:12px;width:100%;transition:background .2s}
.auth-box .auth-btn:hover{background:#4338ca}
.auth-box .auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-msg{background:rgba(239,68,68,.15);border:1px solid #ef4444;border-radius:6px;color:#fca5a5;font-size:13px;margin-top:12px;padding:8px;display:none}
.auth-msg.success{background:rgba(34,197,94,.15);border-color:#22c55e;color:#86efac}
.auth-footer{color:#666;font-size:12px;margin-top:16px}

/* Chat Page */
#chatPage{display:none;height:100vh;flex-direction:column}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#14142a;border-bottom:1px solid #1e1e3a;gap:12px}
.top-left{display:flex;align-items:center;gap:12px}
.sidebar-toggle{background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px;display:none}
.logo-text{color:#fff;font-size:16px;font-weight:600}
.top-center{color:#a5b4fc;font-size:13px;flex-shrink:0}
.top-right{display:flex;align-items:center;gap:8px}
.top-right select{background:#252540;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:13px;padding:6px 10px;outline:none;cursor:pointer}
.top-right select:focus{border-color:#4f46e5}
.user-btn{background:#252540;border:1px solid #333;border-radius:6px;color:#888;cursor:pointer;font-size:12px;padding:6px 12px}
.user-btn:hover{border-color:#ef4444;color:#ef4444}
.user-name{color:#a5b4fc;font-size:13px;padding:0 4px}

.chat-container{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;background:#14142a;border-right:1px solid #1e1e3a;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar.hidden{display:none}
.new-chat-btn{background:#4f46e5;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;padding:10px 16px;margin:12px;transition:background .2s}
.new-chat-btn:hover{background:#4338ca}
#conversationList{flex:1;overflow-y:auto;padding:0 8px}
.conv-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#888;margin-bottom:2px;transition:all .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item:hover{background:#1e1e3a;color:#e0e0e0}
.conv-item.active{background:#252540;color:#fff}
.conv-item .del-btn{float:right;opacity:0;color:#ef4444;cursor:pointer;padding:0 4px}
.conv-item:hover .del-btn{opacity:.6}
.conv-item .del-btn:hover{opacity:1}

.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:20px;scroll-behavior:smooth}
.welcome-msg{text-align:center;padding:60px 20px;color:#666}
.welcome-msg h2{color:#fff;font-size:28px;margin-bottom:8px}
.welcome-msg p{font-size:14px}
.welcome-msg .models-info{margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.welcome-msg .model-tag{background:#252540;border:1px solid #333;border-radius:16px;padding:6px 14px;font-size:12px;color:#a5b4fc;cursor:pointer}
.welcome-msg .model-tag:hover{border-color:#4f46e5}

.msg-row{display:flex;margin-bottom:20px;gap:12px;max-width:800px;margin-left:auto;margin-right:auto;width:100%}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-avatar.user{background:#4f46e5;color:#fff}
.msg-avatar.ai{background:#1e1e3a;color:#a5b4fc}
.msg-bubble{background:#1a1a2e;border-radius:12px;padding:12px 16px;font-size:14px;line-height:1.6;max-width:85%;word-wrap:break-word}
.msg-row.user .msg-bubble{background:#4f46e5;color:#fff}
.msg-bubble .thinking{color:#888;font-size:12px;margin-bottom:8px;padding:8px;background:#252540;border-radius:8px;white-space:pre-wrap;display:none}
.msg-bubble .thinking.show{display:block}
.msg-bubble .thinking-toggle{color:#a5b4fc;font-size:12px;cursor:pointer;margin-bottom:4px}
.msg-bubble .thinking-toggle:hover{text-decoration:underline}
.msg-bubble pre{background:#0f0f1a;border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0;font-size:13px}
.msg-bubble code{font-family:"Cascadia Code","Fira Code",monospace;font-size:13px}
.msg-bubble .cost-info{font-size:11px;color:#666;margin-top:4px}

.input-area{display:flex;gap:8px;padding:12px 20px 20px;max-width:800px;margin:0 auto;width:100%}
.input-area textarea{flex:1;background:#1a1a2e;border:1px solid #333;border-radius:12px;color:#fff;font-size:14px;padding:12px 16px;outline:none;resize:none;min-height:48px;max-height:150px;line-height:1.5}
.input-area textarea:focus{border-color:#4f46e5}
.input-area .send-btn{background:#4f46e5;border:none;border-radius:12px;color:#fff;cursor:pointer;padding:12px 24px;font-size:14px;transition:background .2s;flex-shrink:0;align-self:flex-end}
.input-area .send-btn:hover{background:#4338ca}
.input-area .send-btn:disabled{opacity:.5;cursor:not-allowed}

@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:inline-block;width:16px;height:16px;border:2px solid #4f46e5;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}

@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:52px;bottom:0;z-index:100;width:220px;display:none}
  .sidebar.show{display:flex}
  .sidebar-toggle{display:block}
  .top-right select{font-size:12px;padding:4px 8px;max-width:100px}
  .welcome-msg h2{font-size:22px}
  .msg-row{padding:0 4px}
  .msg-bubble{font-size:13px;max-width:90%}
}
</style>
</head>
<body>

<div id="authPage">
<div class="auth-box">
  <h1>TokenProxy AI</h1>
  <p class="sub">AI ???? ? ????</p>
  <div class="auth-tabs">
    <button id="tabLogin" class="active" onclick="switchAuth('login')">??</button>
    <button id="tabReg" onclick="switchAuth('register')">??</button>
  </div>
  <div id="loginForm">
    <input type="email" id="loginEmail" placeholder="????" autocomplete="email">
    <button class="auth-btn" onclick="login()" id="loginBtn">??</button>
  </div>
  <div id="registerForm" style="display:none">
    <input type="text" id="regName" placeholder="????" autocomplete="off">
    <input type="email" id="regEmail" placeholder="????" autocomplete="email">
    <button class="auth-btn" onclick="register()" id="regBtn">??</button>
  </div>
  <div id="authMsg" class="auth-msg"></div>
  <div class="auth-footer">???? 1 ???? ? ?????????</div>
</div>
</div>

<div id="chatPage">
<div class="top-bar">
  <div class="top-left">
    <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('show')">?</button>
    <span class="logo-text">TokenProxy AI</span>
  </div>
  <div class="top-center">
    <span>??: </span><span id="balanceDisplay">0.00</span>
  </div>
  <div class="top-right">
    <span class="user-name" id="userNameDisplay"></span>
    <select id="modelSelect">
      <option value="deepseek-v4-flash">??? (v4-flash)</option>
      <option value="deepseek-v4-pro">??? (v4-pro)</option>
      <option value="deepseek-reasoner">??? (reasoner)</option>
    </select>
    <button class="user-btn" onclick="logout()">??</button>
  </div>
</div>

<div class="chat-container">
<div id="sidebar" class="sidebar">
  <button class="new-chat-btn" onclick="newChat()">+ ???</button>
  <div id="conversationList"></div>
</div>

<div class="main-area">
<div id="chatMessages" class="chat-messages">
<div class="welcome-msg">
  <h2>????</h2>
  <p>???????????</p>
  <div class="models-info">
    <span class="model-tag" onclick="selectModel('deepseek-v4-flash')">??? flash</span>
    <span class="model-tag" onclick="selectModel('deepseek-v4-pro')">??? pro</span>
    <span class="model-tag" onclick="selectModel('deepseek-reasoner')">??? reasoner</span>
  </div>
</div>
</div>

<div class="input-area">
  <textarea id="chatInput" rows="1" placeholder="?????Enter ??" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">??</button>
</div>
</div>
</div>
</div>

<script>
var API_KEY = localStorage.getItem("tp_token") || "";
var USER_NAME = localStorage.getItem("tp_name") || "";
var CURRENT_CONV = null;
var CONVERSATIONS = JSON.parse(localStorage.getItem("tp_convs") || "[]");
var IS_SENDING = false;
var BALANCE = 0;

// Init
if(API_KEY) {
  document.getElementById("authPage").style.display = "none";
  document.getElementById("chatPage").style.display = "flex";
  document.getElementById("userNameDisplay").textContent = USER_NAME;
  loadBalance();
  renderConversations();
}

function showAuth(msg, isSuccess) {
  var el = document.getElementById("authMsg");
  if(msg) { el.textContent = msg; el.style.display = "block"; el.className = "auth-msg" + (isSuccess ? " success" : ""); }
  else { el.style.display = "none"; }
}

function switchAuth(tab) {
  document.getElementById("tabLogin").className = tab === "login" ? "active" : "";
  document.getElementById("tabReg").className = tab === "register" ? "active" : "";
  document.getElementById("loginForm").style.display = tab === "login" ? "block" : "none";
  document.getElementById("registerForm").style.display = tab === "register" ? "block" : "none";
  showAuth(null);
}

async function login() {
  var email = document.getElementById("loginEmail").value.trim().toLowerCase();
  var btn = document.getElementById("loginBtn");
  if(!email || !email.includes("@")) { showAuth("??????????"); return; }
  btn.disabled = true; btn.textContent = "???..."; showAuth(null);
  try {
    var r = await fetch("/v1/login", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email})});
    var d = await r.json();
    if(d.error) { showAuth(d.error); return; }
    doLogin(d.api_key, d.name, d.balance);
  } catch(e) { showAuth("????: " + e.message); }
  finally { btn.disabled = false; btn.textContent = "??"; }
}

async function register() {
  var name = document.getElementById("regName").value.trim();
  var email = document.getElementById("regEmail").value.trim().toLowerCase();
  var btn = document.getElementById("regBtn");
  if(!name) { showAuth("?????"); return; }
  if(!email || !email.includes("@")) { showAuth("??????????"); return; }
  btn.disabled = true; btn.textContent = "???..."; showAuth(null);
  try {
    var r = await fetch("/v1/register", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({name, email})});
    var d = await r.json();
    if(d.error) { showAuth(d.error); return; }
    doLogin(d.api_key, d.name, d.balance);
  } catch(e) { showAuth("????: " + e.message); }
  finally { btn.disabled = false; btn.textContent = "??"; }
}

function doLogin(key, name, balance) {
  API_KEY = key; USER_NAME = name;
  localStorage.setItem("tp_token", key);
  localStorage.setItem("tp_name", name);
  document.getElementById("authPage").style.display = "none";
  document.getElementById("chatPage").style.display = "flex";
  document.getElementById("userNameDisplay").textContent = name;
  BALANCE = balance || 0;
  document.getElementById("balanceDisplay").textContent = BALANCE.toFixed(4);
  renderConversations();
}

function logout() {
  API_KEY = ""; USER_NAME = "";
  localStorage.removeItem("tp_token");
  localStorage.removeItem("tp_name");
  document.getElementById("chatPage").style.display = "none";
  document.getElementById("authPage").style.display = "flex";
  document.getElementById("loginEmail").value = "";
  document.getElementById("chatMessages").innerHTML = "";
}

function selectModel(model) {
  document.getElementById("modelSelect").value = model;
}

async function loadBalance() {
  if(!API_KEY) return;
  try {
    var r = await fetch("/v1/balance", {headers:{"Authorization":"Bearer "+API_KEY}});
    var d = await r.json();
    if(d.balance !== undefined) {
      BALANCE = d.balance;
      document.getElementById("balanceDisplay").textContent = BALANCE.toFixed(4);
    }
  } catch(e) {}
}

// Conversations
function renderConversations() {
  var el = document.getElementById("conversationList");
  el.innerHTML = CONVERSATIONS.map(function(c, i){
    var active = CURRENT_CONV && CURRENT_CONV.id === c.id ? "active" : "";
    return "<div class=\'conv-item "+active+"\' onclick=\'switchConv("+i+")\'>"+c.title+"<span class=\'del-btn\' onclick=\'event.stopPropagation();deleteConv("+i+")\'>?</span></div>";
  }).join("");
}

function newChat() {
  CURRENT_CONV = {id:Date.now(), title:"???", messages:[]};
  renderConversations();
  renderMessages();
}

function switchConv(idx) {
  CURRENT_CONV = CONVERSATIONS[idx];
  renderConversations();
  renderMessages();
  document.getElementById("sidebar").classList.remove("show");
}

function deleteConv(idx) {
  CONVERSATIONS.splice(idx, 1);
  if(CURRENT_CONV && CURRENT_CONV === CONVERSATIONS[idx]) CURRENT_CONV = null;
  else if(CURRENT_CONV && CONVERSATIONS.indexOf(CURRENT_CONV) < 0) CURRENT_CONV = null;
  localStorage.setItem("tp_convs", JSON.stringify(CONVERSATIONS));
  renderConversations();
  renderMessages();
}

function saveConversations() {
  localStorage.setItem("tp_convs", JSON.stringify(CONVERSATIONS));
}

function renderMessages() {
  var el = document.getElementById("chatMessages");
  if(!CURRENT_CONV || !CURRENT_CONV.messages || CURRENT_CONV.messages.length === 0) {
    el.innerHTML = "<div class=\'welcome-msg\'><h2>????</h2><p>????????</p><div class=\'models-info\'>" +
      "<span class=\'model-tag\' onclick=\'selectModel(\"deepseek-v4-flash\")\'>??? flash</span>" +
      "<span class=\'model-tag\' onclick=\'selectModel(\"deepseek-v4-pro\")\'>??? pro</span>" +
      "<span class=\'model-tag\' onclick=\'selectModel(\"deepseek-reasoner\")\'>??? reasoner</span></div></div>";
    return;
  }
  el.innerHTML = CURRENT_CONV.messages.map(function(m){
    if(m.role === "system") return "";
    var isUser = m.role === "user";
    var thinkingHtml = "";
    if(m.reasoning) {
      thinkingHtml = "<div class=\'thinking-toggle\' onclick=\'this.nextElementSibling.classList.toggle(\"show\")\'>?? ??????</div><div class=\'thinking\'>"+escapeHtml(m.reasoning)+"</div>";
    }
    var costHtml = m.cost ? "<div class=\'cost-info\'>??: ?"+m.cost.toFixed(6)+"</div>" : "";
    return "<div class=\'msg-row "+(isUser?"user":"ai")+"\'><div class=\'msg-avatar "+(isUser?"user":"ai")+"\'>"+(isUser?"U":"AI")+"</div><div class=\'msg-bubble\'>"+thinkingHtml+renderMarkdown(m.content)+costHtml+"</div></div>";
  }).join("");
  el.scrollTop = el.scrollHeight;
}

// Simple markdown renderer
function renderMarkdown(text) {
  if(!text) return "";
  var t = text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/```(\w*)\n([\s\S]*?)```/g, "<pre><code>$2</code></pre>")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/\n/g, "<br>");
  return t;
}

function escapeHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Send message
async function sendMessage() {
  var input = document.getElementById("chatInput");
  var text = input.value.trim();
  if(!text || IS_SENDING) return;
  if(!API_KEY) { alert("????"); return; }

  if(!CURRENT_CONV) newChat();
  if(CURRENT_CONV.messages.length === 0) {
    CURRENT_CONV.title = text.substring(0, 20) + (text.length > 20 ? "..." : "");
  }

  var model = document.getElementById("modelSelect").value;
  var messages = CURRENT_CONV.messages.filter(function(m){return m.role !== "system";});
  messages.push({role:"user", content:text});

  CURRENT_CONV.messages.push({role:"user", content:text});
  input.value = "";
  input.style.height = "auto";
  renderMessages();
  if(!CONVERSATIONS.includes(CURRENT_CONV)) CONVERSATIONS.push(CURRENT_CONV);
  renderConversations();
  saveConversations();

  // Show loading
  IS_SENDING = true;
  document.getElementById("sendBtn").disabled = true;
  document.getElementById("sendBtn").textContent = "...";

  var msgEl = document.getElementById("chatMessages");
  msgEl.innerHTML += "<div class=\'msg-row ai\' id=\'aiMsg\'><div class=\'msg-avatar ai\'>AI</div><div class=\'msg-bubble\'><span class=\'loading\'></span></div></div>";
  msgEl.scrollTop = msgEl.scrollHeight;

  try {
    var response = await fetch("/v1/chat/completions", {
      method: "POST",
      headers: {"Authorization":"Bearer "+API_KEY, "Content-Type":"application/json"},
      body: JSON.stringify({model: model, messages: messages, stream: true})
    });

    // Handle both streaming and non-streaming
    var aiMsg = document.getElementById("aiMsg");
    var bubble = aiMsg.querySelector(".msg-bubble");
    var content = "";
    var reasoning = "";

    if(response.headers.get("content-type")?.includes("text/event-stream")) {
      // Streaming
      var reader = response.body.getReader();
      var decoder = new TextDecoder();
      var buffer = "";

      while(true) {
        var result = await reader.read();
        if(result.done) break;
        buffer += decoder.decode(result.value, {stream: true});
        var lines = buffer.split("\n");
        buffer = lines.pop() || "";
        for(var line of lines) {
          line = line.trim();
          if(line.startsWith("data: ")) {
            var data = line.substring(6);
            if(data === "[DONE]") continue;
            try {
              var json = JSON.parse(data);
              var delta = json.choices?.[0]?.delta || {};
              if(delta.content) {
                content += delta.content;
                bubble.innerHTML = renderMarkdown(content);
              }
              if(delta.reasoning_content) {
                reasoning += delta.reasoning_content;
              }
            } catch(e) {}
          }
        }
        msgEl.scrollTop = msgEl.scrollHeight;
      }
    } else {
      // Non-streaming fallback
      var json = await response.json();
      content = json.choices?.[0]?.message?.content || "";
      reasoning = json.choices?.[0]?.message?.reasoning_content || "";
      bubble.innerHTML = renderMarkdown(content);
    }

    CURRENT_CONV.messages.push({
      role: "assistant",
      content: content,
      reasoning: reasoning
    });
    renderMessages();
    saveConversations();
    loadBalance();

  } catch(e) {
    var aiMsg = document.getElementById("aiMsg");
    if(aiMsg) {
      aiMsg.querySelector(".msg-bubble").innerHTML = "????: " + e.message;
    }
  }

  IS_SENDING = false;
  document.getElementById("sendBtn").disabled = false;
  document.getElementById("sendBtn").textContent = "??";
  document.getElementById("chatInput").focus();
}

// Auto-resize textarea
document.getElementById("chatInput").addEventListener("input", function(){
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 150) + "px";
});
</script>
</body>
</html>
