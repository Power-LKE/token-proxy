<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LinkPower 代理管理</title>
<link rel="stylesheet" href="/static/css/design-system.css">
<style>
body{background:var(--bg-primary);min-height:100vh}
#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg-secondary)}
.login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-2xl);padding:40px 32px;width:400px;max-width:90vw;text-align:center;box-shadow:var(--shadow-lg)}
.login-card h1{font-size:20px;margin-bottom:4px}
.login-card .sub{font-size:13px;color:var(--text-secondary);margin-bottom:24px}
#dash{display:none}
.navbar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.navbar-brand{font-size:16px;font-weight:700}
.navbar-brand span{color:var(--accent)}
.container{max-width:960px;margin:0 auto;padding:32px 24px}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h1>LinkPower 代理管理</h1>
    <p class="sub">请输入代理 API Key</p>
    <div class="form-group"><input class="form-input" type="password" id="loginKey" placeholder="粘贴代理 API Key ..."></div>
    <button class="btn btn-primary w-full" id="loginBtn" onclick="resellerLogin()">登录</button>
    <div class="form-error mt-2 hidden" id="loginError"></div>
  </div>
</div>

<div id="dash">
  <nav class="navbar">
    <span class="navbar-brand">Link<span>Power</span> - 代理</span>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </nav>
  <div class="container">
    <div class="stat-grid mb-6">
      <div class="stat-card"><div class="stat-label">子用户数</div><div class="stat-value" id="statUsers">—</div><div class="stat-sub" id="statActive"></div></div>
      <div class="stat-card"><div class="stat-label">总余额</div><div class="stat-value" id="statBalance">—</div></div>
      <div class="stat-card"><div class="stat-label">今日消耗</div><div class="stat-value" id="statTodayRev">—</div><div class="stat-sub" id="statTodayTokens"></div></div>
    </div>

    <h2 class="heading-md mb-4">子用户列表</h2>
    <div class="card mb-6">
      <div class="flex gap-3 mb-4"><input class="form-input" style="max-width:240px" id="userSearch" placeholder="搜索用户..." oninput="renderUsers()"></div>
      <div class="table-wrap"><table><thead><tr><th>用户名</th><th>API Key</th><th>余额</th><th>状态</th><th>注册时间</th></tr></thead><tbody id="userList"><tr><td colspan="5"><div class="empty-state"><div class="empty-state-desc">加载中...</div></div></td></tr></tbody></table></div>
    </div>

    <h2 class="heading-md mb-4">充值</h2>
    <div class="card" style="max-width:520px">
      <div class="form-group"><label class="form-label">用户 API Key</label><input class="form-input" id="topKey" placeholder="sk-xxx..."></div>
      <div class="form-group"><label class="form-label">金额（元）</label><input class="form-input" type="number" id="topAmt" value="10" step="1"></div>
      <button class="btn btn-primary" onclick="doTopUp()">确认充值</button>
      <div class="form-error mt-2 hidden" id="topErr"></div>
      <div class="form-hint mt-2 hidden" style="color:var(--success)" id="topOk"></div>
    </div>
  </div>
</div>

<script src="/static/js/utils.js"></script>
<script src="/static/js/api.js"></script>
<script>
let RESELLER_KEY = '';
let allUsers = [];

async function resellerLogin() {
  const key = $('loginKey').value.trim();
  if(!key){$('loginError').textContent='请输入代理 Key';$('loginError').classList.remove('hidden');return}
  RESELLER_KEY = key;
  $('loginBtn').disabled=true;$('loginBtn').textContent='验证中...';
  try{await resellerApi.verify();$('loginScreen').style.display='none';$('dash').style.display='block';loadAll()}
  catch(e){$('loginError').textContent=e.message;$('loginError').classList.remove('hidden');}
  finally{$('loginBtn').disabled=false;$('loginBtn').textContent='登录'}
}

async function loadAll() {
  try{const s=await resellerApi.getStats();$('statUsers').textContent=s.user_count;$('statActive').textContent=`活跃: ${s.active_users}`;$('statBalance').textContent=formatBalance(s.total_balance);$('statTodayRev').textContent=formatBalance(s.today_revenue);$('statTodayTokens').textContent=formatTokens(s.today_tokens)}
  catch(e){showToast('加载统计失败: '+e.message,'error')}
  try{const d=await resellerApi.getUsers();allUsers=d.users||[];renderUsers()}
  catch(e){showToast('加载用户失败: '+e.message,'error')}
}

function renderUsers() {
  const q=($('userSearch')?.value||'').toLowerCase();
  let users=allUsers;
  if(q) users=users.filter(u=>(u.name||'').toLowerCase().includes(q)||(u.api_key||'').toLowerCase().includes(q));
  if(!users.length){$('userList').innerHTML='<tr><td colspan="5"><div class="empty-state"><div class="empty-state-desc">暂无用户</div></div></td></tr>';return}
  $('userList').innerHTML=users.map(u=>`<tr><td>${escHtml(u.name)}</td><td class="text-mono">${shortKey(u.api_key,14)}</td><td>${formatBalance(u.balance)}</td><td><span class="badge ${u.is_active?'badge-success':'badge-danger'}">${u.is_active?'启用':'禁用'}</span></td><td>${formatDate(u.created_at)}</td></tr>`).join('');
}

async function doTopUp() {
  const key=$('topKey').value.trim(),amt=parseFloat($('topAmt').value);
  if(!key){$('topErr').textContent='请输入用户 Key';$('topErr').classList.remove('hidden');return}
  if(!amt||amt<=0){$('topErr').textContent='金额必须大于 0';$('topErr').classList.remove('hidden');return}
  try{const d=await resellerApi.topUp(key,amt);$('topErr').classList.add('hidden');$('topOk').textContent=`充值成功！${escHtml(d.name)} 余额: ${formatBalance(d.balance)}`;$('topOk').classList.remove('hidden');loadAll()}
  catch(e){$('topErr').textContent=e.message;$('topErr').classList.remove('hidden');$('topOk').classList.add('hidden')}
}
</script>
</body>
</html>
