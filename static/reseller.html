<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LinkPower 代理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#0f0f1a;color:#e0e0e0;min-height:100vh}
#loginBg{align-items:center;background:#0f0f1a;display:flex;height:100vh;justify-content:center;left:0;position:fixed;top:0;width:100vw;z-index:999}
.login-box{background:#1a1a2e;border-radius:12px;padding:36px;text-align:center;width:400px;max-width:90vw}
.login-box h1{color:#fff;font-size:20px;margin-bottom:4px}
.login-box p{color:#888;font-size:13px;margin-bottom:20px}
.login-box input{background:#252540;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;margin-bottom:12px;outline:none;padding:12px 16px;width:100%}
.login-box input:focus{border-color:#4f46e5}
.login-box button{background:#4f46e5;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:15px;padding:12px;width:100%}
.login-box button:hover{background:#4338ca}
.login-box .login-msg{background:rgba(239,68,68,.15);border:1px solid #ef4444;border-radius:6px;color:#fca5a5;font-size:13px;margin-top:12px;padding:8px;display:none}
#dash{display:none}
.sidebar{background:#14142a;border-right:1px solid #1e1e3a;height:100vh;left:0;padding:24px;position:fixed;top:0;width:180px}
.sidebar h2{color:#fff;font-size:15px;margin-bottom:2px}
.sidebar .sub{color:#555;font-size:11px;margin-bottom:20px}
.sidebar a{color:#888;cursor:pointer;display:block;font-size:13px;padding:9px 12px;text-decoration:none;border-radius:6px;margin-bottom:2px}
.sidebar a:hover,.sidebar a.active{background:#1e1e3a;color:#fff}
.main{margin-left:180px;padding:24px 32px}
.page{display:none}.page.active{display:block}
.stats{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-bottom:24px}
.stat-card{background:#1a1a2e;border-radius:8px;padding:16px 18px}
.stat-card .l{color:#888;font-size:11px;margin-bottom:4px}
.stat-card .v{color:#fff;font-size:22px;font-weight:700}
.card{background:#1a1a2e;border-radius:8px;margin-bottom:16px;padding:20px}
.card h3{color:#fff;font-size:14px;margin-bottom:12px}
.card p{color:#888;font-size:13px;margin-bottom:12px}
label{color:#888;display:block;font-size:12px;margin-bottom:4px}
input{background:#252540;border:1px solid #333;border-radius:6px;color:#fff;font-size:13px;outline:none;padding:10px 12px;width:100%}
input:focus{border-color:#4f46e5}
.row{display:grid;gap:12px;grid-template-columns:1fr 1fr;margin-bottom:12px}
.btn{background:#252540;border:none;border-radius:6px;color:#c0c0c0;cursor:pointer;font-size:12px;padding:8px 14px;display:inline-block}
.btn-primary{background:#4f46e5;color:#fff}
.btn-success{background:#16a34a;color:#fff}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:#888;padding:10px 12px;border-bottom:1px solid #333;font-weight:400}
td{padding:10px 12px;border-bottom:1px solid #1e1e3a}
tr:hover{background:#14142a}
.key-cell{font-family:monospace;font-size:12px;color:#a5b4fc;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px}
.badge.on{background:rgba(22,163,74,.15);color:#4ade80}
.badge.off{background:rgba(239,68,68,.15);color:#f87171}
.msg{background:rgba(22,163,74,.1);border:1px solid #16a34a;border-radius:6px;color:#86efac;font-size:13px;margin-top:12px;padding:10px 12px;display:none}
.msg.err{background:rgba(239,68,68,.15);border-color:#ef4444;color:#fca5a5}
.amt-btn{background:#252540;border:1px solid #333;border-radius:6px;color:#c0c0c0;cursor:pointer;font-size:13px;padding:8px 18px;margin-right:4px;margin-bottom:4px}
.amt-btn:hover{background:#4f46e5;border-color:#4f46e5;color:#fff}
</style></head>
<body>
<div id="loginBg">
  <div class="login-box">
    <h1>LinkPower 代理后台</h1>
    <p>请输入你的代理 API Key 登录</p>
    <input type="password" id="loginKey" placeholder="粘贴代理 Key...">
    <button id="loginBtn">登录</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>
<div id="dash">
  <div class="sidebar">
    <h2>LinkPower</h2>
    <div class="sub">代理后台</div>
    <a id="navOverview" class="active" onclick="showPage('overview')">概览</a>
    <a id="navUsers" onclick="showPage('users')">用户管理</a>
    <a id="navRecharge" onclick="showPage('recharge')">充值</a>
  </div>
  <div class="main">
    <div class="page active" id="pageOverview">
      <h2 style="font-size:18px;margin-bottom:20px">概览</h2>
      <div class="stats">
        <div class="stat-card"><div class="l">我的用户</div><div class="v" id="statUsers">-</div></div>
        <div class="stat-card"><div class="l">活跃用户</div><div class="v" id="statActive">-</div></div>
        <div class="stat-card"><div class="l">用户总余额</div><div class="v" id="statBalance">-</div></div>
        <div class="stat-card"><div class="l">今日消耗</div><div class="v" id="statTodayRev">-</div></div>
      </div>
    </div>
    <div class="page" id="pageUsers">
      <h2 style="font-size:18px;margin-bottom:16px">我的用户</h2>
      <div class="card">
        <input type="text" id="searchInput" placeholder="搜索用户名或 Key..." style="margin-bottom:12px;max-width:300px">
        <div id="userList"><p style="color:#888;text-align:center;padding:20px">加载中...</p></div>
      </div>
    </div>
    <div class="page" id="pageRecharge">
      <h2 style="font-size:18px;margin-bottom:16px">用户充值</h2>
      <div class="card">
        <p>输入用户的 API Key 为其增加余额。</p>
        <div style="margin-bottom:12px"><label>用户 API Key</label><input type="text" id="topKey" placeholder="sk-xxx..."></div>
        <div style="margin-bottom:8px">
          <button class="amt-btn" onclick="document.getElementById('topAmt').value=10">10</button>
          <button class="amt-btn" onclick="document.getElementById('topAmt').value=20">20</button>
          <button class="amt-btn" onclick="document.getElementById('topAmt').value=50">50</button>
          <button class="amt-btn" onclick="document.getElementById('topAmt').value=100">100</button>
        </div>
        <div style="margin-bottom:12px"><label>金额（元）</label><input type="number" id="topAmt" value="10"></div>
        <button class="btn btn-primary" id="topBtn">确认充值</button>
        <div class="msg" id="topMsg"></div>
      </div>
    </div>
  </div>
</div>
<script>
var RESELLER_KEY = "", allUsers = [];
var origin = window.location.origin;
function $(id){return document.getElementById(id);}
function api(method, url, body){
  var o = {headers: {"Authorization": "Bearer "+RESELLER_KEY}};
  if(body){o.method="POST";o.body=JSON.stringify(body);o.headers["Content-Type"]="application/json";}
  return fetch(origin+url, o).then(function(r){return r.json();});
}
document.getElementById("loginBtn").onclick = function(){
  var k = document.getElementById("loginKey").value.trim(), m = document.getElementById("loginMsg");
  if(!k){m.textContent="请输入 Key";m.style.display="block";return;}
  RESELLER_KEY = k; document.getElementById("loginBtn").disabled=true; document.getElementById("loginBtn").textContent="登录中...";
  api("GET","/v1/reseller/verify").then(function(d){
    if(d.status==="ok"){document.getElementById("loginBg").style.display="none";document.getElementById("dash").style.display="block";loadOverview();loadUsers();}
    else{m.textContent=d.error||"验证失败";m.style.display="block";document.getElementById("loginBtn").disabled=false;document.getElementById("loginBtn").textContent="登录";}
  }).catch(function(e){m.textContent="请求失败 "+e.message;m.style.display="block";document.getElementById("loginBtn").disabled=false;document.getElementById("loginBtn").textContent="登录";});
};
document.getElementById("loginKey").onkeydown=function(e){if(e.key==="Enter")document.getElementById("loginBtn").click();};
function showPage(n){
  ["navOverview","navUsers","navRecharge"].forEach(function(i){document.getElementById(i).classList.remove("active");});
  document.getElementById("nav"+n.charAt(0).toUpperCase()+n.slice(1)).classList.add("active");
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  document.getElementById("page"+n.charAt(0).toUpperCase()+n.slice(1)).classList.add("active");
  if(n==="overview")loadOverview();if(n==="users")loadUsers();
}
function loadOverview(){
  api("GET","/v1/reseller/stats").then(function(d){
    document.getElementById("statUsers").textContent=d.user_count||0;
    document.getElementById("statActive").textContent=d.active_users||0;
    document.getElementById("statBalance").textContent=(d.total_balance||0).toFixed(2)+" 元";
    document.getElementById("statTodayRev").textContent="¥"+(d.today_revenue||0).toFixed(4);
  }).catch(function(){});
}
function loadUsers(){
  api("GET","/v1/reseller/users").then(function(d){
    if(d.users){allUsers=d.users;renderUsers();}
  }).catch(function(){});
}
function renderUsers(){
  var q=(document.getElementById("searchInput").value||"").toLowerCase();
  var f=q?allUsers.filter(function(u){return u.name.toLowerCase().indexOf(q)!==-1||u.api_key.indexOf(q)!==-1;}):allUsers;
  if(!f.length){document.getElementById("userList").innerHTML="<p style='color:#888;text-align:center;padding:20px'>暂无用户</p>";return;}
  var h="<table><tr><th>用户名</th><th>Key</th><th>余额</th><th>状态</th><th>创建时间</th></tr>";
  for(var i=0;i<f.length;i++){var u=f[i];
    var badge=u.is_active?'<span class="badge on">启用</span>':'<span class="badge off">禁用</span>';
    h+="<tr><td>"+u.name+"</td><td class='key-cell'>"+u.api_key.substring(0,16)+"...</td><td>"+u.balance.toFixed(2)+" 元</td><td>"+badge+"</td><td style='font-size:12px;color:#666'>"+(u.created_at||"-").substring(0,10)+"</td></tr>";}
  h+="</table>";document.getElementById("userList").innerHTML=h;
}
document.getElementById("searchInput").onkeyup=function(){renderUsers();};
document.getElementById("topBtn").onclick=function(){
  var k=document.getElementById("topKey").value.trim(),a=parseFloat(document.getElementById("topAmt").value)||0,m=document.getElementById("topMsg");
  if(!k){m.textContent="请输入用户 Key";m.className="msg err";m.style.display="block";return;}
  if(a<=0){m.textContent="充值金额必须大于 0";m.className="msg err";m.style.display="block";return;}
  api("POST","/v1/reseller/users/topup",{api_key:k,amount:a}).then(function(d){
    if(d.balance!==undefined){m.innerHTML="已为 <b>"+d.name+"</b> 充值 <b>"+a.toFixed(2)+"</b> 元，当前余额 <b>"+d.balance.toFixed(2)+"</b> 元";m.className="msg";m.style.display="block";document.getElementById("topKey").value="";loadUsers();}
    else{m.textContent=d.error||"充值失败";m.className="msg err";m.style.display="block";}
  }).catch(function(e){m.textContent="请求失败: "+e.message;m.className="msg err";m.style.display="block";});
};
</script>
</body>
</html>
